  (function() {
    const logEl = document.getElementById('actionLog');

      const ts = new Date().toTimeString().slice(0, 8);

      const col = isAudience ? '#ffffff' : '#00EEC8';

      line.style.cssText = 'background:rgba(0,0,0,0.62);color:' + col + ';' + extra + 'font-family:monospace;font-size:11px;padding:4px 10px;border-radius:5px;transition:opacity 1.4s;opacity:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:420px;';
      line.textContent = ts + '  ' + msg;
      logEl.insertBefore(line, logEl.firstChild);
      while (logEl.children.length > 5) logEl.removeChild(logEl.lastChild);

// Subtle camera zoom that follows a newly dropped word for ~5 seconds
const cam = { zoom: 1, tZoom: 1, ox: 0, tOx: 0, oy: 0, tOy: 0, timer: 0 };
let camPill = null; // pill currently tracked by camera

function focusCamOnPill(pill) {
  camPill = pill;
  cam.tZoom = 1.6;
  cam.timer = 300;    // 5 seconds at 60fps
}

function updateCam() {
  if (camPill && !camPill.dissolving && cam.timer > 0) {
    // Tighter follow multiplier (0.45 vs 0.28) so camera tracks pill faster
    const tx = (width / 2 - camPill.pos.x) * 0.45;
    const ty = (height / 2 - camPill.pos.y) * 0.45;
    cam.tOx += (tx - cam.tOx) * 0.22;
    cam.tOy += (ty - cam.tOy) * 0.22;
  }
  // Faster lerp on zoom-in (0.08) vs zoom-out (0.04)
  const zoomLerp = cam.tZoom > cam.zoom ? 0.08 : 0.04;
  cam.zoom = lerp(cam.zoom, cam.tZoom, zoomLerp);
  cam.ox   = lerp(cam.ox,   cam.tOx,   0.10);
  cam.oy   = lerp(cam.oy,   cam.tOy,   0.10);
  if (cam.timer > 0) {
    cam.timer--;
    if (cam.timer === 0) {
      cam.tZoom = 1; cam.tOx = 0; cam.tOy = 0; camPill = null;
    }
  }
}

// Draws a design-tool selection frame (Figma-style) around the tracked pill,

function drawPillFocusCorners(pill) {
  if (!pill) return;
  const zoomAmount = cam.zoom - 1.0;
  const a = constrain(map(zoomAmount, 0.05, 0.4, 0, 255), 0, 255);
  if (a < 4) return;

  const pad = 10;
  const hw = pill.w / 2 * pill.scaleFactor + pad;
  const hh = pill.h / 2 * pill.scaleFactor + pad;
  const handleSize = 4;

  push();

/* ---------- AMBIENT GLOW FIELD ----------
   Exact port of the proven field system from the other aquarium build.
   A small low-res grid (48x30) that pills/fish/pump deposit soft color
   into as they move, decayed each frame, composited via a tiny offscreen
   canvas blurred ONCE per frame. This replaced an earlier from-scratch
   color-blob system that rescanned every fish/pill every frame to find
   cluster centroids -- structurally more expensive than just letting
   objects deposit glow naturally as they move and letting the field decay
   on its own, which is what this version does. */
const FIELD_GRID_W = 48, FIELD_GRID_H = 30;

// composite work, not just hides it), 1 is full strength. Lowered to 0.4

function makeAmbientField() {
  fieldCanvas.width = FIELD_GRID_W;

  for (let i = 0; i < FIELD_GRID_W * FIELD_GRID_H; i++) cells.push({ r: 0, g: 0, b: 0, a: 0 });

}

function depositGlow(x, y, rgb, strength, radiusCells) {
  if (!ambientField || width < 10 || height < 10 || glowIntensity <= 0) return;
  strength *= glowIntensity;
  const gx = constrain(floor((x / width) * FIELD_GRID_W), 0, FIELD_GRID_W - 1);
  const gy = constrain(floor((y / height) * FIELD_GRID_H), 0, FIELD_GRID_H - 1);
  const r = Math.max(1, Math.round(Math.min(radiusCells * 0.5, 10)));
  for (let dy = -r; dy <= r; dy++) {
    for (let dx = -r; dx <= r; dx++) {
      const cx = gx + dx, cy = gy + dy;
      if (cx < 0 || cx >= FIELD_GRID_W || cy < 0 || cy >= FIELD_GRID_H) continue;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > r) continue;
      const falloff = 1 - (dist / r);
      const cell = ambientField[cy * FIELD_GRID_W + cx];
      const add = strength * falloff * falloff;
      cell.r = cell.r * (1 - add * 0.5) + rgb[0] * add * 0.5;
      cell.g = cell.g * (1 - add * 0.5) + rgb[1] * add * 0.5;
      cell.b = cell.b * (1 - add * 0.5) + rgb[2] * add * 0.5;
      cell.a = Math.min(1, cell.a + add);

}

function setup() {
  area = document.querySelector('.tool-canvas-area');
  
  // Hide the static placeholder canvas
  const staticCanvas = document.getElementById('canvas');
  if (staticCanvas) staticCanvas.style.display = 'none';

  let c = createCanvas(area.clientWidth, area.clientHeight);
  c.parent(area);
  c.id('canvas'); // Required for export to work
  pixelDensity(1);  // 1:1 pixel ratio — prevents 4× GPU work on retina displays
  frameRate(30);    // 30fps is imperceptible on a projection, halves draw calls

  // Initialize the shared ambient glow field -- low-res grid that pills,
  // fish, and pump deposit soft color into as they move/act, decayed each
  // frame and composited via a single blurred draw call.
  ambientField = makeAmbientField();
  
  // Initialize reef environment
  initReef();
  
  // Initialize boids
  updateBoidCount();
  
  // Load persisted pills state
  const savedState = controls.get('wordsState');
  if (savedState && Array.isArray(savedState)) {
    pills = savedState.map(data => new Pill(data));
  }
  
  // Wire the drop word button
  controls.onAction('dropWord', () => {
    const txt = controls.get('textContent') || 'Fish';
    dropNewWord(txt);
  });
  
  // Wire the pump button
  controls.onAction('pump', () => {
    triggerPump();
  });
  
  // Listen for state changes (e.g. on Reset)
  controls.onChange('wordsState', (state) => {
    if (state && Array.isArray(state)) {
      pills = state.map(data => new Pill(data));
    } else {
      pills = [];
    }
  });

  window._p5Ready = true;
}

// Light blue water background, exact port of the reference build's
// drawBg(): a 6-stop vertical gradient from bright blue at the top

function triggerPump() {
  playPumpSound();
  pumpActiveFrames = 30; // Trigger active pump sequence
  
  // Scatter the fish
  for (let boid of boids) {
    let force = p5.Vector.sub(boid.position, createVector(width / 2, height / 2));
    force.normalize();
    force.mult(random(12, 25) * pumpPowerVal);
    boid.velocity.add(force);
  }
  
  // Scatter the pills
  for (let pill of pills) {
    pill.vel.x += random(-10, 10) * pumpPowerVal;
    pill.vel.y -= random(10, 18) * pumpPowerVal;
    pill.isResting = false;
    pill.hasLanded = false;
  }

  // Flood the ambient field with a broad cool glow -- the water visibly
  // carries the disturbance for a few seconds, matching the reference
  // build's pump deposit. Capped deposit count keeps this cheap.
  const floodN = Math.min(5 + Math.round(pumpPowerVal * 0.4), 8);
  for (let i = 0; i < floodN; i++) {
    depositGlow(random(0, width), random(height * 0.5, height), [150, 210, 255], 0.18 * Math.min(pumpPowerVal / 4, 1.5), 6);
  }
  
  savePillsState();
}

// Manual "clear out now": fades the oldest 40% of non-dissolving pills
// quietly -- no pump, no particles, matching the real aquarium's behavior.
function manualClearOut() {
  const settled = pills.filter(p => !p.dissolving).sort((a, b) => a.spawnFrame - b.spawnFrame);
  const n = Math.ceil(settled.length * 0.4);
  for (let i = 0; i < n; i++) {
    settled[i].startQuietFade();
  }
}

// Density-cap check: once non-dissolving pill count exceeds densityCapVal,
// the oldest few start fading quietly. Called once per frame from draw().
function checkDensityCap() {
  const nonDissolving = pills.filter(p => !p.dissolving);
  if (nonDissolving.length > densityCapVal) {
    const toFade = nonDissolving.length - densityCapVal;
    const oldestFirst = nonDissolving.sort((a, b) => a.spawnFrame - b.spawnFrame);
    for (let i = 0; i < Math.min(toFade, 3); i++) {
      oldestFirst[i].startQuietFade();
    }
  }
}

function setShrinkAfterMinutes(minutes) {
  shrinkAfterMs = Math.max(1, minutes) * 60 * 1000;
}
function setShrinkMinScale(v) { shrinkMinScale = Math.max(0.1, Math.min(1.0, v)); }
function setNoShrink(v) { noShrink = !!v; }
function resetFishStomachs() { for (let b of boids) b.foodEaten = 0; }

// Shake: a local force burst centered on whatever was most recently
// dropped (or the average position of all pills if none was just dropped),
// nudging nearby pills and fish -- matches the real aquarium's shakeNearby.
function shakeNearby() {
  const alive = pills.filter(p => !p.dissolving);
  if (alive.length === 0) return;

  // Target = the latest dropped pill (or most recent alive pill)
  let targetPill = (lastDroppedPill && !lastDroppedPill.dissolving) ? lastDroppedPill : alive[alive.length - 1];
  const center = targetPill.pos.copy();

  // Cancel any active camera zoom so shake doesn't follow the pill flying up
  cam.tZoom = 1; cam.timer = 0; cam.tOx = 0; cam.tOy = 0; camPill = null;

  // 1. Target pill gets a gentle upward pump
  targetPill.vel.y -= random(9, 13);
  targetPill.vel.x += random(-3, 3);
  targetPill.isResting = false;
  targetPill.hasLanded = false;

  // 2. Surrounding pills get a smaller outward + upward ripple, fading with distance
  const RADIUS = Math.max(200, width * 0.55);
  for (let pill of alive) {
    if (pill === targetPill) continue;
    const d = p5.Vector.dist(pill.pos, center);
    if (d < RADIUS) {
      const proximity = 1 - d / RADIUS;
      const force = proximity * 6;
      const dir = p5.Vector.sub(pill.pos, center).normalize();
      pill.vel.add(p5.Vector.mult(dir, force * random(0.4, 0.9)));
      pill.vel.y -= force * random(0.6, 1.2);
      pill.isResting = false;
      pill.hasLanded = false;
    }
  }

  // Fish scatter outward from the target
  for (let boid of boids) {
    const d = p5.Vector.dist(boid.position, center);
    if (d < RADIUS && d > 0.1) {
      const force = (1 - d / RADIUS) * 4;
      boid.velocity.add(p5.Vector.sub(boid.position, center).normalize().mult(force));
    }
  }

  // Bubbles cluster around the target pill, thinning with distance
  for (let i = 0; i < 36; i++) {
    const spread = RADIUS * 0.55 * Math.pow(Math.random(), 0.6); // more near center
    const angle = random(TWO_PI);
    bubbles.push(new Bubble(
      center.x + cos(angle) * spread,
      center.y + sin(angle) * spread * 0.4,
      random(2, 9), -random(2, 5), 'landing'
    ));
  }
  ripples.push(new ExpansionRing(center.x, center.y, 50, 2.5, color(180, 220, 255)));
  ripples.push(new ExpansionRing(center.x, center.y, 110, 1.6, color(200, 230, 255)));
  playShakeSound();
}

function draw() {
  // Background always fills full screen regardless of camera zoom
  if (nightMode) drawNightBackground(); else drawLightBlueBackground();

  const isPlaying = controls.get('playing');
  const maxSpeed = controls.get('fishSpeed');
  const fishSize = controls.get('fishSize');
  const cohesionMult = controls.get('cohesion');
  const separationMult = controls.get('separation');
  const alignmentMult = controls.get('alignment');
  const mouseMode = controls.get('mouseInteraction');
  const showTrails = controls.get('showTrails');
  const palette = controls.get('palette');

  // Sync boid count
  updateBoidCount();

  // Update camera before push so lerp values are current this frame
  updateCam();

  // ---- camera transform wraps the whole scene ----
  push();
  applyCam();

  decayAmbientField();
  drawAmbientFieldToOffscreen();
  drawAmbientField();

  drawReefBackground();
  drawReefForeground();

  for (let i = ripples.length - 1; i >= 0; i--) {
    ripples[i].update(); ripples[i].draw();
    if (ripples[i].isDead()) ripples.splice(i, 1);
  }

  updateAndDrawBubbles();
  updateAndDrawFood(isPlaying);

  if (isPlaying) {
    resolvePillCollisions();
    checkDensityCap();
  }

  for (let i = pills.length - 1; i >= 0; i--) {
    const pill = pills[i];
    if (isPlaying) pill.update();
    pill.draw();
    if (pill.dissolving && pill.dissolveProgress >= 1) pills.splice(i, 1);
  }

  for (let boid of boids) {
    if (isPlaying) {
      boid.flock(boids, cohesionMult, separationMult, alignmentMult);
      boid.interactWithMouse(mouseMode);
      boid.interactWithFood(foodParticles);
      boid.interactWithPills(pills);
      boid.update(maxSpeed);
      boid.borders();
    }
    boid.draw(fishSize, showTrails, nightMode ? NEON_FISH_PALETTE : palette);
  }

  drawCaustics();
  drawPillFocusCorners(camPill);
  drawWaterSurface();
  handlePumpSequence();

  pop();
  // ---- end camera transform ----
}

// ---- Voronoi caustics buffer ----
let _causticBuf = null;
let _causticSeeds = [];
const _CW = 220, _CH = 150, _CSEEDS = 20;

function initCausticsNet() {
  _causticBuf = createGraphics(_CW, _CH);
  _causticBuf.pixelDensity(1);
  _causticSeeds = [];
  for (let i = 0; i < _CSEEDS; i++) {
    _causticSeeds.push({
      x: Math.random() * _CW,
      y: Math.random() * _CH,
      vx: (Math.random() - 0.5) * 0.38,
      vy: (Math.random() - 0.5) * 0.28,
    });
  }
  _renderCausticsVoronoi();
}

function _renderCausticsVoronoi() {
  for (const s of _causticSeeds) {
    s.x = (s.x + s.vx + _CW) % _CW;
    s.y = (s.y + s.vy + _CH) % _CH;
  }
  _causticBuf.loadPixels();
  const px = _causticBuf.pixels;
  for (let row = 0; row < _CH; row++) {
    for (let col = 0; col < _CW; col++) {
      let d1sq = 1e9, d2sq = 1e9;
      for (const s of _causticSeeds) {
        let dx = Math.abs(col - s.x); if (dx > _CW * 0.5) dx = _CW - dx;
        let dy = Math.abs(row - s.y); if (dy > _CH * 0.5) dy = _CH - dy;
        const dsq = dx * dx + dy * dy;
        if (dsq < d1sq) { d2sq = d1sq; d1sq = dsq; } else if (dsq < d2sq) { d2sq = dsq; }
      }
      const ratio = Math.sqrt(d1sq / d2sq);
      const t = Math.max(0, (ratio - 0.52) / 0.48);
      const v = (Math.pow(t, 1.6) * 255) | 0;
      const idx = (row * _CW + col) * 4;
      px[idx] = v; px[idx + 1] = v; px[idx + 2] = v; px[idx + 3] = 255;
    }
  }
  _causticBuf.updatePixels();
}

function drawCaustics() {
  if (!_causticBuf) return;
  const waterTop = 35;
  if (frameCount % 3 === 0) _renderCausticsVoronoi();
  push();
  drawingContext.save();
  drawingContext.beginPath();
  drawingContext.rect(0, waterTop, width, height - waterTop);
  drawingContext.clip();
  drawingContext.globalCompositeOperation = 'screen';
  drawingContext.globalAlpha = 0.07;
  drawingContext.imageSmoothingEnabled = true;
  drawingContext.imageSmoothingQuality = 'high';
  drawingContext.drawImage(_causticBuf.elt, 0, waterTop, width, height - waterTop);
  drawingContext.globalAlpha = 1.0;
  drawingContext.restore();
  pop();
}

function drawReefBackground() {
  // Draw rocks
  for (let r of rocks) {
    push();
    fill(80, 85, 95);
    stroke(50, 55, 65);
    strokeWeight(2);
    beginShape();
    let steps = 8;
    for (let i = 0; i < steps; i++) {
      let angle = map(i, 0, steps, 0, TWO_PI);
      let offset = map(noise(cos(angle) + r.seed, sin(angle) + r.seed), 0, 1, -10, 10);
      let rx = r.x + cos(angle) * (r.w/2 + offset);
      let ry = r.y + sin(angle) * (r.h/2 + offset);
      vertex(rx, ry);
    }
    endShape(CLOSE);
    pop();
  }
  
  // Draw shelf rock
  if (shelfRock) {
    shelfRock.draw();
  }
  

  // Draw custom seagrass images
  for (let g of _customGrass) g.draw();

  // Draw SVG sea-floor plants
  for (let p of _svgInstances) p.draw();

  // Draw star decals
  _drawStarDecals();
}

function drawReefForeground() {
  // Draw clams
  for (let clam of clams) {
    clam.draw();
  }
  
  // Draw sandy bottom
  drawSandyBottom();
}

function handlePumpSequence() {
  if (pumpActiveFrames > 0) {
    // Spawn strong bubble streams from two vents near the middle-bottom
    const ventL = width * 0.35;
    const ventR = width * 0.65;
    let numBubbles = floor(random(3, 6) * pumpPowerVal);
    for (let i = 0; i < numBubbles; i++) {
      bubbles.push(new Bubble(ventL + random(-15, 15), height - 15, random(4, 10), -random(4, 10) * pumpPowerVal, 'pump'));
      bubbles.push(new Bubble(ventR + random(-15, 15), height - 15, random(4, 10), -random(4, 10) * pumpPowerVal, 'pump'));
    }

    // Staggered ripple rings
    if (pumpActiveFrames % 10 === 0) {
      ripples.push(new ExpansionRing(ventL, height - 15, 100 * pumpPowerVal, 2, color(100, 200, 255)));
      ripples.push(new ExpansionRing(ventR, height - 15, 100 * pumpPowerVal, 2, color(100, 200, 255)));
    }
    
    pumpActiveFrames--;
  }
}

function updateAndDrawBubbles() {
  // Slow background trickle of ambient bubbles
  if (random(1) < 0.03) {
    bubbles.push(new Bubble(random(width), height - 15, random(3, 7), -random(1, 2.5), 'ambient'));
  }
  
  for (let i = bubbles.length - 1; i >= 0; i--) {
    bubbles[i].update();
    bubbles[i].draw();
    if (bubbles[i].isDead()) {
      bubbles.splice(i, 1);
    }
  }
}

function updateBoidCount() {
  const targetCount = controls.get('fishCount');
  while (boids.length < targetCount) {
    boids.push(new Boid(random(width), random(35, height - 20)));
  }
  while (boids.length > targetCount) {
    boids.pop();
  }
}


function mousePressed() {
  if (mouseX >= 0 && mouseX <= width && mouseY >= 0 && mouseY <= height) {
    playRippleSound();
    ripples.push(new ExpansionRing(mouseX, mouseY, 150, 3, color(150, 220, 255)));
    // Push nearby pills
    for (let pill of pills) {
      let d = dist(mouseX, mouseY, pill.pos.x, pill.pos.y);
      if (d < 150) {
        let force = p5.Vector.sub(pill.pos, createVector(mouseX, mouseY));
        force.normalize();
        force.mult(map(d, 0, 150, 10, 2) / pill.mass);
        pill.vel.add(force);
        pill.isResting = false;
        pill.hasLanded = false;
      }
    }
  }
}

function savePillsState() {

// Resolve collisions between pills to make them pile up beautifully
function resolvePillCollisions() {
  for (let i = 0; i < pills.length; i++) {
    for (let j = i + 1; j < pills.length; j++) {
      let p1 = pills[i];
      let p2 = pills[j];
      if (p1.dissolving || p2.dissolving) continue;
      
      let r1 = max(p1.w, p1.h) / 2 * p1.scaleFactor;
      let r2 = max(p2.w, p2.h) / 2 * p2.scaleFactor;
      let minDist = r1 + r2;
      let d = dist(p1.pos.x, p1.pos.y, p2.pos.x, p2.pos.y);
      
      if (d < minDist && d > 0) {
        let overlap = minDist - d;
        let dir = p5.Vector.sub(p1.pos, p2.pos).normalize();
        
        // Separate them based on mass
        let totalMass = p1.mass + p2.mass;
        let ratio1 = p2.mass / totalMass;
        let ratio2 = p1.mass / totalMass;
        
        p1.pos.add(p5.Vector.mult(dir, overlap * ratio1));
        p2.pos.sub(p5.Vector.mult(dir, overlap * ratio2));
        
        // Elastic bounce
        let relativeVelocity = p5.Vector.sub(p1.vel, p2.vel);
        let speed = relativeVelocity.dot(dir);
        if (speed < 0) {
          let impulse = -(1 + 0.2) * speed / (1/p1.mass + 1/p2.mass);
          p1.vel.add(p5.Vector.mult(dir, impulse / p1.mass));
          p2.vel.sub(p5.Vector.mult(dir, impulse / p2.mass));
        }
        
        p1.isResting = false;
        p2.isResting = false;
      }
    }
  }
}

// Pill class representing each dropped word
class Pill {
  constructor(data) {
    this.text = data.text;
    this.pos = createVector(data.x, data.y);
    this.vel = createVector(data.vx || 0, data.vy || 0);
    this.shape = data.shape;
    this.paletteIndex = data.paletteIndex;
    this.fontFamily = data.fontFamily;
    this.fontSize = data.fontSize;
    this.fontWeight = data.fontWeight;
    this.spawnFrame = data.spawnFrame || frameCount;
    this.wobbleOffset = data.wobbleOffset || random(1000);
    this.angle = 0;
    this.isResting = false;
    this.hasLanded = false;
    this.hasEntered = false;
    // dissolve state, added for density-cap / clear-out / auto-clear:
    // a pill quietly shrinks and fades rather than popping or bursting
    this.dissolving = false;
    this.dissolveProgress = 0;
    this.birthTime = data.birthTime || Date.now();
    this.scaleFactor = (data.scaleFactor != null) ? data.scaleFactor : 1.0;

    // Calculate dimensions based on text (also determines this.fontSize)
    this.calculateDimensions();
    this.mass = constrain((this.w * this.h) * 0.005, 1, 15);
  }
  
  calculateDimensions() {
    const charCount = this.text.length;
    const initialSize = Math.min(16, Math.max(10, Math.floor(240 / Math.max(charCount, 1))));
    const MAX_W = 89;

    push();
    let chosenSize = 10;
    let chosenLines = null;

    for (let trySize = initialSize; trySize >= 10; trySize--) {
      textSize(trySize);
      textFont(this.fontFamily);
      if (this.fontWeight === 'bold') textStyle(BOLD); else textStyle(NORMAL);

      const words = this.text.split(' ');
      const lines = [];
      let currentLine = '';

      const hardBreakWord = (word) => {
        let chunk = '';
        for (let c = 0; c < word.length; c++) {
          const tc = chunk + word[c];
          if (textWidth(tc) > MAX_W && chunk) {
            lines.push(chunk);
            chunk = word[c];
            if (lines.length >= 4) return '';
          } else { chunk = tc; }
        }
        return chunk;
      };

      for (let i = 0; i < words.length; i++) {
        if (lines.length >= 4) break;
        const word = words[i];
        if (textWidth(word) > MAX_W) {
          if (currentLine) { lines.push(currentLine); currentLine = ''; }
          if (lines.length >= 4) break;
          currentLine = hardBreakWord(word);
          if (lines.length >= 4) break;
          continue;
        }
        const testLine = currentLine ? currentLine + ' ' + word : word;
        if (textWidth(testLine) > MAX_W && currentLine) {
          lines.push(currentLine);
          currentLine = word;
        } else { currentLine = testLine; }
      }
      if (currentLine && lines.length < 4) lines.push(currentLine);
      if (lines.length === 0) lines.push(this.text);

      if (lines.length <= 4) { chosenSize = trySize; chosenLines = lines.slice(0, 4); break; }
      if (trySize === 10) { chosenSize = 10; chosenLines = lines.slice(0, 4); }
    }

    this.fontSize = chosenSize;
    this.lines = chosenLines || [this.text];

    textSize(this.fontSize);
    textFont(this.fontFamily);
    if (this.fontWeight === 'bold') textStyle(BOLD); else textStyle(NORMAL);
    let maxLineWidth = 0;
    for (const line of this.lines) {
      const lw = textWidth(line);
      if (lw > maxLineWidth) maxLineWidth = lw;
    }

    this.lineHeight = this.fontSize * 1.3;
    const PILL_PAD = 18;
    this.w = min(maxLineWidth + PILL_PAD * 2, 125);
    this.h = (this.lines.length * this.lineHeight) + PILL_PAD * 2;

    // Never taller than wide — prefer wider horizontal shapes
    if (this.h > this.w) this.w = this.h;

    if (this.shape === 'circle') {
      // Try to fit all text on one line by shrinking font until it fits,
      // so short texts like 六個字 never get the last char dropped.
      const fullText = this.text.trim();
      let bestSize = chosenSize;
      for (let ts = chosenSize; ts >= 8; ts--) {
        textSize(ts); textFont(this.fontFamily);
        if (this.fontWeight === 'bold') textStyle(BOLD); else textStyle(NORMAL);
        if (textWidth(fullText) <= MAX_W * 1.6) { bestSize = ts; break; }
      }
      textSize(bestSize); textFont(this.fontFamily);
      if (this.fontWeight === 'bold') textStyle(BOLD); else textStyle(NORMAL);
      this.fontSize = bestSize;
      this.lineHeight = bestSize * 1.3;
      this.lines = [fullText];
      const cPad = PILL_PAD + 18;
      this.w = textWidth(fullText) + cPad * 2;
      this.h = this.lineHeight + PILL_PAD * 2;
      const s = max(this.w, this.h);
      this.w = s; this.h = s;
    }
    pop();
  }
  
  // Quietly fade away -- no particles, no pump, just shrink + fade.
  // Used by density-cap overflow, manual clear-out, and the auto-clear timer.
  startQuietFade() {
    if (this.dissolving) return;
    this.dissolving = true;
    this.dissolveProgress = 0;
  }

  update() {
    if (this.dissolving) {
      this.dissolveProgress += 0.012;
      return;
    }
    // Age-based shrinking: after shrinkAfterMs, smoothly lerp toward 70%
    const ageMs = Date.now() - this.birthTime;
    if (!noShrink && ageMs > shrinkAfterMs && this.scaleFactor > shrinkMinScale) {
      this.scaleFactor += (shrinkMinScale - this.scaleFactor) * 0.0003;
      if (this.scaleFactor < shrinkMinScale + 0.001) this.scaleFactor = shrinkMinScale;
    }
    if (this.isResting) {
      // Gentle resting wobble in sync with ambient sway
      this.angle = sin(frameCount * 0.03 + this.wobbleOffset) * 0.06;
      this.vel.mult(0);
      return;
    }
    
    // Apply gravity, scaled by the remote "drop speed" control
    // (decayVal default 4 matches the remote's default display value)
    this.vel.y += 0.15 * (decayVal / 4);
    
    // Apply water resistance (drag)
    this.vel.mult(0.97);
    
    // Update position
    this.pos.add(this.vel);
    
    // Constrain to top surface of the water once entered
    let r = max(this.w, this.h) / 2 * this.scaleFactor;
    let topSurface = 35;
    
    if (!this.hasEntered) {
      if (this.pos.y > topSurface + r) {
        this.hasEntered = true;
      }
    } else {
      if (this.pos.y < topSurface + r) {
        this.pos.y = topSurface + r;
        this.vel.y = abs(this.vel.y) * 0.4; // Bounce downwards
      }
    }
    
    // Bounce off walls with inset padding so pills don't clip edges
    const wallPad = 10;
    if (this.pos.x < r + wallPad) {
      this.pos.x = r + wallPad;
      this.vel.x *= -0.3;
    } else if (this.pos.x > width - r - wallPad) {
      this.pos.x = width - r - wallPad;
      this.vel.x *= -0.3;
    }
    
    // Settle on shelf rock
    if (shelfRock) {
      let shelfTop = shelfRock.y - shelfRock.h/2;
      let shelfBottom = shelfRock.y + shelfRock.h/2;
      let shelfLeft = shelfRock.x - shelfRock.w/2;
      let shelfRight = shelfRock.x + shelfRock.w/2;
      
      if (this.pos.x > shelfLeft && this.pos.x < shelfRight) {
        if (this.pos.y + this.h/2 > shelfTop && this.pos.y - this.h/2 < shelfBottom && this.vel.y > 0) {
          this.pos.y = shelfTop - this.h/2;
          this.vel.y *= -0.2;
          this.vel.x *= 0.8;
          
          if (abs(this.vel.y) < 0.2 && abs(this.vel.x) < 0.2) {
            this.isResting = true;
            this.triggerLandingSplash();
          }
        }
      }
    }
    
    // Settle on floor (top of sand layer)
    let groundY = height - 15;
    const floorR = this.h / 2 * this.scaleFactor;
    if (this.pos.y > groundY - floorR) {
      this.pos.y = groundY - floorR;
      this.vel.y *= -0.2; // low bounciness on floor
      this.vel.x *= 0.8;  // friction
      
      if (abs(this.vel.y) < 0.2 && abs(this.vel.x) < 0.2) {
        this.isResting = true;
        this.triggerLandingSplash();
      }
    }
  }
  
  triggerLandingSplash() {
    if (!this.hasLanded) {
      this.hasLanded = true;
      // Landing — a second, smaller burst (5 bubbles + another ring) fires when the pill actually settles
      for (let i = 0; i < 5; i++) {
        bubbles.push(new Bubble(this.pos.x + random(-10, 10), this.pos.y, random(3, 7), -random(1, 3), 'landing'));
      }
      ripples.push(new ExpansionRing(this.pos.x, this.pos.y, 40, 1.5, color(180, 220, 255)));
      // One-time stronger glow burst into the ambient field on settle,
      // matching the reference build's pill-landing deposit.
      depositGlow(this.pos.x, this.pos.y, hexToRgbArr(PILL_PALETTES[this.paletteIndex].bg), 0.4, 8);
    }
  }
  
  draw() {
    const palette = nightMode ? NEON_PILL_PALETTES : PILL_PALETTES;
    const colors = palette[this.paletteIndex % palette.length];
    const age = frameCount - this.spawnFrame;
    
    push();
    translate(this.pos.x, this.pos.y);
    rotate(this.angle);
    scale(this.scaleFactor);

    let dissolveAlpha = 1;
    if (this.dissolving) {
      const t = this.dissolveProgress;
      dissolveAlpha = 1 - t;
      scale(1 - t * 0.12);
    }
    
    // Continuous ambient glow: every non-dissolving pill deposits its own
    // color into the shared ambient field each frame, exactly like the
    // reference build, instead of drawing a per-object shadowBlur halo.
    const _rgb = hexToRgbArr(colors.bg); // parsed once, reused for glow + shadow below
    if (!this.dissolving && this.hasEntered) {
      depositGlow(this.pos.x, this.pos.y, _rgb, 0.09, 6);
    }

    // Feathered pill: shadow color matches the fill so the pill's own color
    // bleeds softly outward into the water. Center stays fully opaque.
    const bgCol = color(colors.bg);
    bgCol.setAlpha(dissolveAlpha * 255);
    drawingContext.shadowBlur = 6;
    drawingContext.shadowColor = `rgba(${Math.round(_rgb[0])},${Math.round(_rgb[1])},${Math.round(_rgb[2])},${dissolveAlpha * 0.9})`;
    fill(bgCol);
    noStroke();

    if (this.shape === 'pill') {
      rect(-this.w/2, -this.h/2, this.w, this.h, this.h/2);
    } else if (this.shape === 'box') {
      rect(-this.w/2, -this.h/2, this.w, this.h, 10);
    } else {
      ellipse(0, 0, this.w);
    }

    // Reset shadow blur for text
    drawingContext.shadowBlur = 0;

    // Draw text
    noStroke();
    const textCol = color(colors.text);
    textCol.setAlpha(dissolveAlpha * 255);
    fill(textCol);
    textAlign(CENTER, CENTER);
    textSize(this.fontSize);
    textFont(this.fontFamily);
    if (this.fontWeight === 'bold') {
      textStyle(BOLD);
    } else {
      textStyle(NORMAL);
    }

    let startY = -((this.lines.length - 1) * this.lineHeight) / 2;
    for (let i = 0; i < this.lines.length; i++) {
      text(this.lines[i], 0, startY + (i * this.lineHeight));
    }
    
    pop();
  }
}

// ExpansionRing class for interactive water effects
class ExpansionRing {
  constructor(x, y, maxR, strokeW = 3, col = '#96dcff') {
    this.x = x;
    this.y = y;
    this.r = 0;
    this.maxR = maxR;
    this.alpha = 255;
    this.strokeW = strokeW;
    this.col = col;
  }
  
  update() {
    this.r += 4;
    this.alpha = map(this.r, 0, this.maxR, 180, 0);
  }
  
  draw() {
    push();
    noFill();
    let c = color(this.col);
    c.setAlpha(this.alpha);
    stroke(c);
    strokeWeight(this.strokeW);
    ellipse(this.x, this.y, this.r * 2);
    pop();
  }
  
  isDead() {
    return this.r >= this.maxR;
  }
}

// ---- Food particles ----
// SVG Star 1 path (viewBox 0 0 18 20, center at 9,10) — exact shape from asset
const _FOOD_STAR_PATH = new Path2D(
  "M9.61047 8.27441L9.61829 8.33984L9.67981 8.31348L16.9591 5.20801L10.63 9.95996L10.5773 10L10.63 10.04L16.9591 14.791L9.67981 11.6865L9.61829 11.6602L9.61047 11.7256L8.66028 19.582L7.71008 11.7256L7.70227 11.6602L7.64075 11.6865L0.360474 14.791L6.69055 10.04L6.74329 10L6.69055 9.95996L0.360474 5.20801L7.64075 8.31348L7.70227 8.33984L7.71008 8.27441L8.66028 0.416992L9.61047 8.27441Z"
);

class FoodParticle {
  constructor(x, y) {
    this.pos = createVector(x, y);
    this.vel = createVector(random(-0.4, 0.4), random(0.5, 1.4));
    this.eaten = false;
    this.alpha = 255;
    this.r = random(7, 13);      // visual display size (star is ~9.5 units radius in SVG space)
    this.spin = random(TWO_PI);
    // Glow gradient shape is fixed per-particle (depends only on this.r) —
    // build it once here and modulate brightness via globalAlpha at draw time
    // instead of recreating the gradient (with re-stringified rgba stops) every frame.
    const glowR = this.r * 4.8;
    this.glowR = glowR;
    this.glowGrad = drawingContext.createRadialGradient(0, 0, 0, 0, 0, glowR);
    this.glowGrad.addColorStop(0,    'rgba(255,255,255,0.60)');
    this.glowGrad.addColorStop(0.35, 'rgba(210,225,255,0.30)');
    this.glowGrad.addColorStop(1,    'rgba(190,210,255,0)');
  }

  update() {
    if (!this.eaten) {
      this.vel.y += 0.03;
      this.vel.mult(0.98);
      this.pos.add(this.vel);
      if (this.pos.y > height * 0.85) this.alpha -= 2;
    } else {
      this.alpha -= 14;          // quick flash-out when eaten
    }
    this.spin += 0.04;
  }

  draw() {
    if (this.alpha <= 0) return;
    const a  = this.alpha;
    const af = a / 255;
    const sc = this.r / 9.5;

    push();
    translate(this.pos.x, this.pos.y);
    rotate(this.spin);

    // Radial gradient glow — white centre fading to transparent blue-white
    // (gradient shape cached in constructor; brightness modulated via globalAlpha)
    drawingContext.save();
    drawingContext.globalAlpha = af;
    drawingContext.fillStyle = this.glowGrad;
    drawingContext.beginPath();
    drawingContext.arc(0, 0, this.glowR, 0, Math.PI * 2);
    drawingContext.fill();
    drawingContext.restore();

    // Draw exact SVG Star 1 path — white fill
    drawingContext.save();
    drawingContext.scale(sc, sc);
    drawingContext.translate(-9, -10);
    drawingContext.fillStyle = `rgba(255,255,255,${af.toFixed(3)})`;
    drawingContext.fill(_FOOD_STAR_PATH);
    drawingContext.strokeStyle = `rgba(220,235,255,${(af * 0.45).toFixed(3)})`;
    drawingContext.lineWidth = 0.5 / sc;
    drawingContext.stroke(_FOOD_STAR_PATH);
    drawingContext.restore();

    pop();
  }

  isDead() { return this.alpha <= 0; }
}

function triggerFeed() {
  playFeedSound();
  const count = floor(random(15, 26));
  for (let i = 0; i < count; i++) {
    const x = random(width * 0.1, width * 0.9);
    const y = random(-20, 30);
    foodParticles.push(new FoodParticle(x, y));
  }
}

function updateAndDrawFood(isPlaying) {
  for (let i = foodParticles.length - 1; i >= 0; i--) {
    const fp = foodParticles[i];
    if (isPlaying) fp.update();
    fp.draw();
    if (fp.isDead()) foodParticles.splice(i, 1);
  }
}

// Bubble class
class Bubble {
  constructor(x, y, size, vy, type = 'ambient') {
    this.pos = createVector(x, y);
    this.vel = createVector(random(-0.5, 0.5), vy || -random(1, 3));
    this.size = size;
    this.alpha = type === 'ambient' ? random(150, 220) : 255;
    this.wobbleSpeed = random(0.05, 0.15);
    this.wobbleAmount = random(1, 3);
    this.type = type;
  }
  
  update() {
    this.pos.add(this.vel);
    this.pos.x += sin(frameCount * this.wobbleSpeed) * this.wobbleAmount * 0.2;
    
    if (this.type === 'ambient') {
      this.alpha -= 0.3;
    } else if (this.type === 'pump') {
      this.alpha -= 1.2;
    } else {
      this.alpha -= 1.8;
    }
  }
  
  draw() {
    push();
    // Semi-transparent white body for high visibility
    fill(255, 255, 255, this.alpha * 0.25);
    stroke(255, 255, 255, this.alpha * 0.6);
    strokeWeight(0.8); // thinner stroke, less obvious against the rest of the scene
    ellipse(this.pos.x, this.pos.y, this.size);
    
    // Highlight
    fill(255, 255, 255, this.alpha * 0.8);
    noStroke();
    ellipse(this.pos.x - this.size * 0.2, this.pos.y - this.size * 0.2, this.size * 0.25);
    pop();
  }
  
  isDead() {
    return this.pos.y < 35 || this.alpha <= 0; // Die at the water surface
  }
}

// ---- Custom seagrass image ----
let _sgCanvas = null;

function loadCustomSeagrass() {
  const img = new Image();
  img.onload = function() {
    const oc = document.createElement('canvas');
    oc.width = img.width; oc.height = img.height;
    const ctx = oc.getContext('2d');
    ctx.drawImage(img, 0, 0);
    const idata = ctx.getImageData(0, 0, oc.width, oc.height);
    const px = idata.data;
    for (let i = 0; i < px.length; i += 4) {
      const r = px[i], g = px[i+1], b = px[i+2];
      if (r > 210 && g > 210 && b > 210) {
        // Smooth anti-alias: map near-white to transparent
        const dist = Math.sqrt((255-r)**2 + (255-g)**2 + (255-b)**2);
        px[i+3] = Math.min(255, dist * 5) | 0;
      }
    }
    ctx.putImageData(idata, 0, 0);
    _sgCanvas = oc;
  };
  img.src = 'assets/seagrass.png';
}

// Deterministic PRNG so layouts stay fixed across reloads but scale with the canvas
function _mulberry32(seed) {
  return function() {
    seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

function _initSvgPlants() {
  _svgImages = _SVG_FILES.map(def => {
    const img = new Image();
    img.src = 'assets/' + encodeURIComponent(def.file);
    return { img, w: def.w, h: def.h };
  });
  _svgInstances = [];
  // One shared scale — preserves relative heights; tallest SVG hits ~26% of tank
  const maxH = Math.max(..._SVG_FILES.map(d => d.h));
  const globalScale = (height - 50) * 0.26 / maxH;
  // ~40 instances: cycle through all SVGs twice with natural jitter
  const total = 40;
  const slotW = width / total;
  const rng = _mulberry32(20260630);
  for (let i = 0; i < total; i++) {
    const def = _svgImages[i % _svgImages.length];
    // Center of slot + up to 60% of slot width jitter for natural clustering
    const x = Math.max(18, Math.min(width - 18, slotW * (i + 0.5) + (rng() - 0.5) * slotW * 0.9));
    // Phase tied to x so a gentle wave travels left→right across the floor
    const phase = x * 0.018 + rng() * 0.5;
    _svgInstances.push(new SvgPlant(def.img, def.w, def.h, x, globalScale, rng() < 0.4, phase));
  }
}

function _initStarDecals() {
  _starDecals = [];
  const starFiles = ['Starfish (1).svg', 'Starfish (2).svg', 'Starfish (3).svg', 'Starfish (4).svg'];
  const rng = _mulberry32(7177);
  starFiles.forEach(file => {
    const img = new Image();
    img.src = 'assets/' + file;
    _starDecals.push({
      img,
      x: 30 + rng() * (width - 60),
      y: 30 + rng() * (height - 80),
      size: 65,
      rot: rng() * Math.PI * 2,
    });
  });
}

function _drawStarDecals() {
  for (const s of _starDecals) {
    if (!s.img.complete || !s.img.naturalWidth) continue;
    drawingContext.save();
    drawingContext.globalAlpha = 0.82;
    drawingContext.translate(s.x, s.y);
    drawingContext.rotate(s.rot);
    drawingContext.drawImage(s.img, -s.size * 0.5, -s.size * 0.5, s.size, s.size);
    drawingContext.globalAlpha = 1;
    drawingContext.restore();
  }
}

class SvgPlant {
  constructor(img, nw, nh, x, scale, flipX, phase) {
    this.img   = img;
    this.nw    = nw;  this.nh = nh;
    this.x     = x;
    this.scale = scale;
    this.flipX = flipX ? -1 : 1;
    this.phase = phase;
    // Slow primary sway + faster flutter for organic feel
    this.speed  = 0.0035 + Math.random() * 0.003;
    this.speed2 = this.speed * (1.6 + Math.random() * 0.4);
  }
  draw() {
    if (!this.img.complete || !this.img.naturalWidth) return;
    const t = frameCount * this.speed;
    // Primary gentle wave + secondary flutter harmonic
    const sway = Math.sin(t + this.phase) * 0.28
               + Math.sin(t * this.speed2 / this.speed + this.phase * 1.3) * 0.09;
    const dw = this.nw * this.scale, dh = this.nh * this.scale;
    drawingContext.save();
    drawingContext.translate(this.x, height - 15);
    drawingContext.rotate(sway);
    drawingContext.scale(this.flipX, 1);
    drawingContext.globalAlpha = 0.90;
    drawingContext.drawImage(this.img, -dw * 0.5, -dh, dw, dh);
    drawingContext.globalAlpha = 1;
    drawingContext.restore();
  }
}

class CustomSeagrass {
  constructor(x, sz, phase, flipX) {
    this.x = x;
    this.sz = sz;
    this.phase = phase;
    this.flipX = flipX ? -1 : 1;
    this.speed = 0.010 + Math.random() * 0.012;
  }
  draw() {
    if (!_sgCanvas) return;
    const groundY = height - 15;
    const sway = Math.sin(frameCount * this.speed + this.phase) * 0.07;
    push();
    translate(this.x, groundY);
    scale(this.flipX, 1);
    rotate(sway);
    drawingContext.drawImage(_sgCanvas, -this.sz * 0.5, -this.sz * 0.95, this.sz, this.sz);
    pop();
  }
}

// Clam class
class Clam {
  constructor(x, y, size) {
    this.x = x;
    this.y = y;
    this.size = size;
    this.phase = random(1000);
  }
  
  draw() {
    push();
    translate(this.x, this.y);
    let openAngle = map(sin(frameCount * 0.015 + this.phase), -1, 1, 0, PI / 6);
    
    // Draw bottom shell
    fill('#d2b48c');
    stroke(0, 50);
    strokeWeight(1.5);
    arc(0, 0, this.size, this.size * 0.6, 0, PI, CHORD);
    
    // Draw top shell (rotating open/closed)
    push();
    rotate(-openAngle);
    fill('#e6c280');
    arc(0, 0, this.size, this.size * 0.6, PI, TWO_PI, CHORD);
    // Draw ridges on top shell
    stroke(0, 30);
    for (let i = 1; i < 5; i++) {
      let angle = map(i, 0, 5, PI, TWO_PI);
      line(0, 0, cos(angle) * this.size * 0.5, sin(angle) * this.size * 0.3);
    }
    pop();
    
    // Inside pearl (visible when open)
    if (openAngle > 0.05) {
      fill(255, 240, 245);
      noStroke();
      ellipse(0, -2, this.size * 0.25);
      // Pearl shine
      fill(255);
      ellipse(-1, -3, this.size * 0.08);
    }
    
    // Occasionally emit a bubble when fully open
    if (openAngle > 0.25 && random(1) < 0.01) {
      bubbles.push(new Bubble(this.x, this.y - 5, random(3, 6), -random(1, 2), 'ambient'));
    }
    pop();
  }
}



// Boid class implementing Craig Reynolds' Flocking algorithm with multiple body shapes
// Draws just the fish body OUTLINE (no fins, no tail, no eyes) at the
// current transform -- factored out so the motion-blur trail can stamp
// the same silhouette repeatedly at past positions, rather than the trail
// needing its own separate shape that wouldn't actually match the fish.
function drawFishSilhouette(bodyShape) {
  // Unit coords — caller does scale(size) so proportions are always locked.
  // Body max half-width 0.52 gives a visible body at small sizes without looking
  // like a needle. Tail tw=0.26 keeps the 2:1 body:tail width ratio.
  if (bodyShape === 0) {
    beginShape();
    vertex(0, -1.2);
    bezierVertex(0.44, -0.7, 0.52, 0.15, 0.18, 1.0);
    bezierVertex(0.10, 1.1, -0.10, 1.1, -0.18, 1.0);
    bezierVertex(-0.52, 0.15, -0.44, -0.7, 0, -1.2);
    endShape(CLOSE);
  } else if (bodyShape === 1) {
    beginShape();
    vertex(0, -1.1);
    bezierVertex(0.40, -0.6, 0.48, 0.15, 0.16, 1.0);
    bezierVertex(0.09, 1.1, -0.09, 1.1, -0.16, 1.0);
    bezierVertex(-0.48, 0.15, -0.40, -0.6, 0, -1.1);
    endShape(CLOSE);
  } else {
    beginShape();
    vertex(0, -1.4);
    bezierVertex(0.32, -0.9, 0.38, 0.25, 0.12, 1.0);
    bezierVertex(0.07, 1.1, -0.07, 1.1, -0.12, 1.0);
    bezierVertex(-0.38, 0.25, -0.32, -0.9, 0, -1.4);
    endShape(CLOSE);
  }
}

class Boid {
  constructor(x, y) {
    this.position = createVector(x, y);
    this.velocity = p5.Vector.random2D().mult(random(2, 4));
    this.acceleration = createVector(0, 0);
    this.maxForce = 0.15;
    this.colorIndex = floor(random(1000)); // Stable index for color selection
    this.bodyShape = floor(random(3)); // 3 distinct body shapes
    this.sizeScale = random(0.55, 1.35); // per-fish size variation, proportion locked
    this.tailPhase = random(TWO_PI);
    this.smoothAngle = random(TWO_PI);
    this.history = [];
    this.foodEaten = 0; // lifetime food-eat counter; capped at 3
  }

  update(maxSpeed) {
    this.velocity.add(this.acceleration);
    this.velocity.limit(maxSpeed);
    this.position.add(this.velocity);
    // Smooth heading: lerp toward actual velocity direction to avoid snappy turns
    const targetAngle = this.velocity.heading() + PI / 2;
    let diff = targetAngle - this.smoothAngle;
    while (diff > PI) diff -= TWO_PI;
    while (diff < -PI) diff += TWO_PI;
    this.smoothAngle += diff * 0.12;
    this.acceleration.mult(0);
    
    // Update tail wagging phase based on speed
    this.tailPhase += this.velocity.mag() * 0.15;
    
    // Update history for trails (position only -- the ported trail deposits
    // glow at each point, it doesn't need historical velocity/orientation)
    this.history.push(this.position.copy());
    if (this.history.length > 72) {
      this.history.shift();
    }
  }
  
  applyForce(force) {
    this.acceleration.add(force);
  }
  
  flock(boids, cohesionMult, separationMult, alignmentMult) {
    // Single combined neighbor scan for separation + alignment + cohesion
    // (previously 3 separate full-array passes per boid -- this halves to
    // a third of the p5.Vector.dist() calls per frame with identical output).
    const fishSz = controls.get('fishSize') || 18;
    const sepRadius = Math.max(32, fishSz * 2.4);
    const neighborDist = 50;
    const maxRadius = Math.max(sepRadius, neighborDist);
    const fishSpeed = controls.get('fishSpeed');

    let sepSum = createVector(0, 0), sepCount = 0;
    let aliSum = createVector(0, 0), aliCount = 0;
    let cohSum = createVector(0, 0), cohCount = 0;

    for (let i = 0; i < boids.length; i++) {
      let other = boids[i];
      if (other === this) continue;
      let d = p5.Vector.dist(this.position, other.position);
      if (d <= 0 || d > maxRadius) continue;

      if (d < sepRadius) {
        let diff = p5.Vector.sub(this.position, other.position);
        diff.normalize();
        diff.div(d);
        sepSum.add(diff);
        sepCount++;
      }
      if (d < neighborDist) {
        aliSum.add(other.velocity);
        aliCount++;
        cohSum.add(other.position);
        cohCount++;
      }
    }

    // Separation
    let sep = createVector(0, 0);
    if (sepCount > 0) sepSum.div(sepCount);
    if (sepSum.mag() > 0) {
      sepSum.normalize();
      sepSum.mult(fishSpeed);
      sepSum.sub(this.velocity);
      sepSum.limit(this.maxForce * 3.5);
      sep = sepSum;
    }

    // Alignment
    let ali = createVector(0, 0);
    if (aliCount > 0) {
      aliSum.div(aliCount);
      aliSum.normalize();
      aliSum.mult(fishSpeed);
      ali = p5.Vector.sub(aliSum, this.velocity);
      ali.limit(this.maxForce);
    }

    // Cohesion
    let coh = createVector(0, 0);
    if (cohCount > 0) {
      cohSum.div(cohCount);
      coh = this.seek(cohSum);
    }

    sep.mult(separationMult);
    ali.mult(alignmentMult);
    coh.mult(cohesionMult);

    this.applyForce(sep);
    this.applyForce(ali);
    this.applyForce(coh);
  }
  
  interactWithMouse(mode) {
    if (mode === 'None') return;
    const rm = window.remoteMouse;
    if (!rm || !rm.active) return;

    const mouseVec = createVector(rm.x * width, rm.y * height);
    const d = p5.Vector.dist(this.position, mouseVec);
    // 400px local gravity well — matches the reference's approach (300px) but
    // wider so it covers the school on larger screens. Force falls off smoothly
    // with distance so nearby fish curve naturally while distant fish still flock.
    if (d < 400) {
      let force = p5.Vector.sub(mouseVec, this.position);
      if (mode === 'Repel') force.mult(-1);
      force.normalize();
      force.mult(map(d, 0, 400, 0.8, 0.05));
      this.applyForce(force);
    }
  }
  
  interactWithFood(particles) {
    for (let fp of particles) {
      if (fp.eaten) continue;
      const d = p5.Vector.dist(this.position, fp.pos);
      // Only attract fish that haven't hit their 3-eat cap
      if (d < 250 && this.foodEaten < 3) {
        let force = p5.Vector.sub(fp.pos, this.position);
        force.normalize();
        force.mult(map(d, 0, 250, 0.55, 0.02));
        this.applyForce(force);
      }
      if (d < 18 && this.foodEaten < 3) {
        fp.eaten = true;
        this.foodEaten++;
        this.sizeScale = min(this.sizeScale * 1.06, 2.2);
      }
    }
  }

  interactWithPills(pills) {
    for (let pill of pills) {
      if (pill.dissolving) continue;
      let d = p5.Vector.dist(this.position, pill.pos);
      let pillRadius = max(pill.w, pill.h) / 2 * pill.scaleFactor;
      // detection buffer widened (15 -> 28) so the push actually triggers
      // before the fish is nearly on top of the pill -- with smaller
      // pills, the old buffer made contact rare enough to feel absent.
      let minDist = pillRadius + 28;
      
      if (d < minDist) {
        // Push the pill away
        let pushForce = p5.Vector.sub(pill.pos, this.position);
        pushForce.normalize();
        
        // Shove strength is inversely proportional to pill mass, boosted
        // overall (was maxing at 3, now 7) so the push is clearly visible
        // rather than a barely-perceptible nudge against drag/gravity.
        let strength = map(d, 0, minDist, 7, 1.2) / pill.mass;
        pushForce.mult(strength);
        pill.vel.add(pushForce);
        pill.isResting = false;
        pill.hasLanded = false;

        // Close contact gets a visible bloom at the midpoint, deposited
        // into the shared ambient field -- matches the reference build's
        // bump-glow behavior, marking the interaction visually.
        const midX = (this.position.x + pill.pos.x) / 2;
        const midY = (this.position.y + pill.pos.y) / 2;
        depositGlow(midX, midY, hexToRgbArr(PILL_PALETTES[pill.paletteIndex].bg), 0.5, 5);
        
        // Deflect the fish slightly
        let deflectForce = p5.Vector.sub(this.position, pill.pos);
        deflectForce.normalize();
        deflectForce.mult(0.1);
        this.applyForce(deflectForce);
      }
    }
  }
  
  seek(target) {
    let desired = p5.Vector.sub(target, this.position);
    desired.normalize();
    desired.mult(controls.get('fishSpeed'));
    let steer = p5.Vector.sub(desired, this.velocity);
    steer.limit(this.maxForce);
    return steer;
  }
  
  borders() {
    let buffer = 20;
    let topSurface = 35;
    
    // Wrap horizontally
    if (this.position.x < -buffer) this.position.x = width + buffer;
    if (this.position.x > width + buffer) this.position.x = -buffer;
    
    // Bounce off top surface and bottom floor
    if (this.position.y < topSurface + 15) {
      this.position.y = topSurface + 15;
      this.velocity.y *= -0.8;
    }
    if (this.position.y > height - 20) {
      this.position.y = height - 20;
      this.velocity.y *= -0.8;
    }
  }
  
  draw(size, showTrails, palette) {
    const size_ = size * this.sizeScale; // per-fish scale, proportions locked
    size = size_;
    let col = palette[this.colorIndex % palette.length];
    let theta = this.smoothAngle;
    const c = color(col); // parsed once, reused for trail/glow/fin tinting below

    // Fish trail: a plain mono-color (white or black) stroke tracing the
    // fish's actual recent path -- no glow, no color blending. Length is
    // driven by real cumulative distance traveled between history points
    // (not a fixed point count), so a fish darting fast leaves a visibly
    // longer trail than one drifting slowly, per request.
    if (showTrails && this.history.length > 2) {
      const speed = this.velocity.mag();
      const maxTrailDistance = constrain(speed * 42, 54, 480); // 3× longer than before

      let pts = [this.position];
      let traveled = 0;
      for (let i = this.history.length - 1; i >= 0; i--) {
        const prev = i === this.history.length - 1 ? this.position : this.history[i + 1];
        const d = dist(prev.x, prev.y, this.history[i].x, this.history[i].y);
        traveled += d;
        pts.push(this.history[i]);
        if (traveled >= maxTrailDistance) break;
      }

      if (pts.length > 2) {
        push();
        noFill();
        stroke(red(c), green(c), blue(c), 128);
        strokeWeight(max(0.2, size * 0.0175));
        strokeCap(ROUND);
        beginShape();
        curveVertex(pts[0].x, pts[0].y);
        for (let i = 0; i < pts.length; i++) curveVertex(pts[i].x, pts[i].y);
        curveVertex(pts[pts.length - 1].x, pts[pts.length - 1].y);
        endShape();
        pop();
      }
    }
    
    push();
    translate(this.position.x, this.position.y);
    rotate(theta);

    // Glow deposit uses world coords — must happen before scale(size).
    depositGlow(this.position.x, this.position.y, [red(c), green(c), blue(c)], 0.05, 3);

    // Single uniform scale makes body + fins + tail permanently proportional —
    // all drawing below uses unit coords (size=1), so the ratio between every
    // part is locked regardless of fishSize slider value.
    scale(size);

    drawingContext.shadowBlur = 6;
    drawingContext.shadowColor = col;
    noStroke();
    fill(col);
    drawFishSilhouette(this.bodyShape);
    drawingContext.shadowBlur = 0;

    // Side fins (unit coords) — scaled to match wider body (max x 0.52)
    const finAlpha = 110;
    const finScale = 0.50;
    fill(red(c), green(c), blue(c), finAlpha);
    push();
    translate(0, -0.2);
    rotate(-PI / 6 + sin(this.tailPhase) * 0.1);
    ellipse(-0.6 * finScale, 0, 0.8 * finScale, 0.3 * finScale);
    pop();
    push();
    translate(0, -0.2);
    rotate(PI / 6 - sin(this.tailPhase) * 0.1);
    ellipse(0.6 * finScale, 0, 0.8 * finScale, 0.3 * finScale);
    pop();

    // Crescent tail (unit coords) — tw=0.26 vs body half-width 0.52 → 2:1 ✓
    const tw  = .5;
    const tB  = 1.1;
    const tL  = 1.15;
    const tNt = tB + tL * 0.46;
    const wig = sin(this.tailPhase) * 0.09;
    fill(col);
    beginShape();
    vertex(0, tB);
    bezierVertex(tw * 0.4 + wig, tB + tL * 0.2, tw + wig, tB + tL * 0.6, tw + wig, tB + tL);
    bezierVertex(tw * 0.5 + wig, tB + tL * 0.72, wig * 0.2, tNt + 0.08, 0, tNt);
    bezierVertex(wig * 0.2, tNt + 0.08, -tw * 0.5 + wig, tB + tL * 0.72, -tw + wig, tB + tL);
    bezierVertex(-tw + wig, tB + tL * 0.6, -tw * 0.4 + wig, tB + tL * 0.2, 0, tB);
    endShape(CLOSE);

    pop();
    drawingContext.shadowBlur = 0;
  }
}

// ---- Sound System (Web Audio API, no external files) ----
let _audioCtx = null;
let _masterVol = 0.5;

function _getAudioCtx() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (_audioCtx.state === 'suspended') _audioCtx.resume();
  return _audioCtx;
}

function playPumpSound() {
  try {
    const ctx = _getAudioCtx();
    // Series of bubble pops with slight randomness in timing and pitch
    const numPops = 8;
    for (let i = 0; i < numPops; i++) {
      const jitter = Math.random() * 0.03;
      const t = ctx.currentTime + i * 0.065 + jitter;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      const baseFreq = 180 + Math.random() * 220;
      osc.type = 'sine';
      osc.frequency.setValueAtTime(baseFreq * 2.2, t);
      osc.frequency.exponentialRampToValueAtTime(baseFreq * 0.7, t + 0.05);
      gain.gain.setValueAtTime(_masterVol * 0.32, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.09);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(t);
      osc.stop(t + 0.09);
    }
  } catch (e) {}
}

function playFeedSound() {
  try {
    const ctx = _getAudioCtx();
    [1200, 1800, 2600, 3400].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      const t = ctx.currentTime + i * 0.06;
      osc.frequency.value = freq + Math.random() * 300;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(_masterVol * 0.12, t + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(t);
      osc.stop(t + 0.22);
    });
  } catch (e) {}
}

function playDropSound() {
  try {
    const ctx = _getAudioCtx();
    const t = ctx.currentTime;
    // Bright ding: fundamental sine with slight downward pitch bend for metallic ring
    const freq = 1380 + (Math.random() - 0.5) * 120;
    const osc1 = ctx.createOscillator(); const g1 = ctx.createGain();
    osc1.type = 'sine';
    osc1.frequency.setValueAtTime(freq, t);
    osc1.frequency.exponentialRampToValueAtTime(freq * 0.91, t + 0.08);
    g1.gain.setValueAtTime(0, t);
    g1.gain.linearRampToValueAtTime(_masterVol * 0.46, t + 0.004);
    g1.gain.exponentialRampToValueAtTime(0.001, t + 0.50);
    osc1.connect(g1); g1.connect(ctx.destination);
    osc1.start(t); osc1.stop(t + 0.50);
    // Second harmonic (bell overtone at ~2.76x) for richness
    const osc2 = ctx.createOscillator(); const g2 = ctx.createGain();
    osc2.type = 'sine';
    osc2.frequency.setValueAtTime(freq * 2.76, t);
    g2.gain.setValueAtTime(0, t);
    g2.gain.linearRampToValueAtTime(_masterVol * 0.14, t + 0.003);
    g2.gain.exponentialRampToValueAtTime(0.001, t + 0.20);
    osc2.connect(g2); g2.connect(ctx.destination);
    osc2.start(t); osc2.stop(t + 0.20);
    // Crisp click transient at the moment of impact
    const bn = ctx.createBuffer(1, Math.round(ctx.sampleRate * 0.006), ctx.sampleRate);
    const dn = bn.getChannelData(0);
    for (let i = 0; i < dn.length; i++) dn[i] = Math.random() * 2 - 1;
    const nb = ctx.createBufferSource(); nb.buffer = bn;
    const fn = ctx.createBiquadFilter(); fn.type = 'highpass'; fn.frequency.value = 4500;
    const gn = ctx.createGain(); gn.gain.value = _masterVol * 0.07;
    nb.connect(fn); fn.connect(gn); gn.connect(ctx.destination);
    nb.start(t); nb.stop(t + 0.006);
  } catch (e) {}
}

function playRippleSound() {
  try {
    const ctx = _getAudioCtx();
    const t = ctx.currentTime;
    // Low magic sparkle: 4 mid-range sine tones, staggered with tiny random detune
    const config = [
      { freq: 420, vol: 0.13, del: 0.000, dur: 0.44 },
      { freq: 560, vol: 0.10, del: 0.038, dur: 0.38 },
      { freq: 630, vol: 0.08, del: 0.070, dur: 0.32 },
      { freq: 840, vol: 0.07, del: 0.105, dur: 0.28 },
    ];
    config.forEach(({ freq, vol, del, dur }) => {
      const osc = ctx.createOscillator(); const gn = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq + (Math.random() - 0.5) * 5; // slight shimmer detune
      gn.gain.setValueAtTime(0, t + del);
      gn.gain.linearRampToValueAtTime(_masterVol * vol, t + del + 0.016);
      gn.gain.exponentialRampToValueAtTime(0.001, t + del + dur);
      osc.connect(gn); gn.connect(ctx.destination);
      osc.start(t + del); osc.stop(t + del + dur + 0.04);
    });
    // Tiny high glint at the top
    const hi = ctx.createOscillator(); const hiG = ctx.createGain();
    hi.type = 'sine';
    hi.frequency.value = 1760 + Math.random() * 440;
    hiG.gain.setValueAtTime(0, t + 0.01);
    hiG.gain.linearRampToValueAtTime(_masterVol * 0.045, t + 0.022);
    hiG.gain.exponentialRampToValueAtTime(0.001, t + 0.16);
    hi.connect(hiG); hiG.connect(ctx.destination);
    hi.start(t + 0.01); hi.stop(t + 0.2);
  } catch (e) {}
}

function playShakeSound() {
  try {
    const ctx = _getAudioCtx();
    // Light jumpy water-droplet cascade — ascending pitch hops with quick decay
    const notes = [520, 680, 820, 660, 900, 740, 1050, 860];
    notes.forEach((freq, i) => {
      const t = ctx.currentTime + i * 0.052;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq * 1.4, t);
      osc.frequency.exponentialRampToValueAtTime(freq, t + 0.04);
      gain.gain.setValueAtTime(_masterVol * 0.22, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.11);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(t);
      osc.stop(t + 0.11);
    });
  } catch (e) {}
}

window.triggerRipple = function(nx, ny) {

window.triggerFeed = triggerFeed;
window.triggerPump = triggerPump;
window.manualClearOut = manualClearOut;
window.checkDensityCap = checkDensityCap;

window.setPumpPower = setPumpPower;
window.setDecayVal = setDecayVal;

window.setNightMode = function(v) { nightMode = !!v; document.body.style.background = nightMode ? '#0B00F9' : '#1866ab'; };
window.setMasterVolume = function(v) { _masterVol = Math.max(0, Math.min(1, v)); };
window.playRippleSound = playRippleSound;
window.lastClearNowCount = null;
window.lastShakeCount = null;
// normalized 0–1 mouse position driven by control.html via Firebase
window.remoteMouse = { x: 0.5, y: 0.5, active: false };

window._restorePillsFromState = function(savedState) {

// the Firebase module script overwrites this once db is ready, so every

window._onPillsStateSaved = null;
// expose the controls mock object too, so the Firebase module script can

window.controls = controls;

  <!-- ============================================================
       Firebase remote-control wiring, added on top of the original

       Pill.startQuietFade()/dissolve handling, resolvePillCollisions

       ============================================================ -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
    import { getDatabase, ref, onChildAdded, onValue, set, get } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAPA5EGbTXMnRJ5uX4O3JvJdCrtSHr5LHQ",
      authDomain: "nn-whnvr.firebaseapp.com",
      databaseURL: "https://nn-whnvr-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "nn-whnvr",
      storageBucket: "nn-whnvr.firebasestorage.app",
      messagingSenderId: "82298055324",
      appId: "1:82298055324:web:2380ad13ff2bd3e7591b59",
      measurementId: "G-JPWDQHRYJK"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    function setDebug(msg, type) { if (typeof window.logAction === 'function') window.logAction(msg, type); }

    const _SEA_CREATURES = ['octopus','jellyfish','seahorse','clownfish','starfish','crab','lobster','dolphin','pufferfish','anglerfish','stingray','turtle','narwhal','manatee','seal','pelican','shrimp','squid','anchovy','swordfish','oyster','urchin','anemone','flounder','blowfish','barnacle','manta','perch','tuna','herring'];
    function _randomCreature() { return _SEA_CREATURES[Math.floor(Math.random() * _SEA_CREATURES.length)]; }

    // logChange suppresses the first 4s of initial load sync, then debounces
    // per-key so dragging a slider only logs the final resting value, not
    // every intermediate step.
    const _moduleStart = Date.now();
    const _logTimers = {};
    function logChange(key, msg) {
      if (Date.now() - _moduleStart < 4000) return;
      clearTimeout(_logTimers[key]);
      _logTimers[key] = setTimeout(() => setDebug(msg), 700);
    }

    setDebug('firebase init OK, waiting for sketch...');

    onValue(ref(db, '.info/connected'), (snap) => {
      const connected = snap.val() === true;
      setDebug(connected ? 'firebase: connected' : 'firebase: disconnected, retrying...');
    });

    // wait for p5's setup() to have run before calling into sketch globals
    function whenReady(fn) {
      if (window._p5Ready && typeof window.dropNewWord === 'function') { setDebug('sketch ready'); fn(); return; }
      let tries = 0;
      const iv = setInterval(() => {
        tries++;
        if (window._p5Ready && typeof window.dropNewWord === 'function') {
          clearInterval(iv);
          setDebug('sketch ready');
          fn();
        } else if (tries > 100) {
          clearInterval(iv);
          setDebug('ERROR: sketch never became ready');
        }
      }, 100);
    }

    whenReady(() => {
      // ---- restore persisted pill state first, then listen for new notes ----
      Promise.all([
        get(ref(db, 'state/pills')),
        get(ref(db, 'notes'))
      ]).then(([snap, notesSnap]) => {
        // Build set of currently active note texts so we can filter stale pills
        const activeTexts = new Set();
        if (notesSnap.exists()) {
          notesSnap.forEach(child => {
            const d = child.val();
            if (d && d.text) activeTexts.add(d.text);
          });
        }

        // Only restore pills whose text still exists in /notes (skips deleted notes)
        const rawSaved = snap.val();
        const saved = rawSaved && Array.isArray(rawSaved)
          ? rawSaved.filter(p => activeTexts.has(p.text))
          : [];

        // Always apply saved state (even empty) so hardcoded test pills
        // in the JS are cleared when /notes has been wiped
        window.controls.set('wordsState', saved);
        if (typeof window._restorePillsFromState === 'function') {
          window._restorePillsFromState(saved);
        }
        if (saved.length > 0) {
          setDebug('restored ' + saved.length + ' pills from Firebase state');
        } else {
          setDebug('tank empty — waiting for new messages');
        }

        // collect note keys already represented in saved state so we skip them
        const restoredTexts = new Set(saved.map(p => p.text));

        // track note keys seen so onChildAdded (which replays all history) only
        // drops notes that aren't already in the restored pill layout
        const seenKeys = new Set();
        onChildAdded(ref(db, 'notes'), (snapshot) => {
          if (seenKeys.has(snapshot.key)) return;
          seenKeys.add(snapshot.key);
          const data = snapshot.val();
          if (data && data.text) {
            // Skip legacy "fed the fish" notes pushed by an older submit.html
            // build -- these are stuck in Firebase history and would otherwise
            // keep replaying as pills forever on every reload.
            if (/fed the fish/i.test(data.text)) return;
            if (restoredTexts.has(data.text)) { restoredTexts.delete(data.text); return; }
            setDebug('@anonymous_' + _randomCreature() + ' commented "' + data.text.slice(0, 32) + '"!', 'audience');
            window.dropNewWord(data.text);
          }
        });
      }).catch((err) => {
        setDebug('state restore failed: ' + err.message + ' — falling back to live notes');
        // fallback: just listen for new notes without any restored state
        onChildAdded(ref(db, 'notes'), (snapshot) => {
          const data = snapshot.val();
          if (data && data.text) {
            if (/fed the fish/i.test(data.text)) return;
            setDebug('@anonymous_' + _randomCreature() + ' commented "' + data.text.slice(0, 32) + '"!', 'audience');
            window.dropNewWord(data.text);
          }
        });
      });

      // ---- pump power ----
      onValue(ref(db, 'controls/power'), (snap) => {
        const v = snap.val();
        if (typeof v === 'number') { window.setPumpPower(v); logChange('power', '@whnvr just changed pump power to ' + v + '×!'); }
      });

      // ---- drop speed / decay ----
      onValue(ref(db, 'controls/decay'), (snap) => {
        const v = snap.val();
        if (typeof v === 'number') { window.setDecayVal(v); logChange('decay', '@whnvr just changed drop speed to ' + v + '×!'); }
      });

      // ---- feed trigger ----
      let lastFeedCount = null;
      onValue(ref(db, 'controls/feed'), (snap) => {
        const v = snap.val();
        if (typeof v === 'number') {
          if (lastFeedCount === null) { lastFeedCount = v; }
          else if (v !== lastFeedCount) {
            lastFeedCount = v;
            window.triggerFeed();
            // Fresh read of feedBy so atomic control-panel update never races
            get(ref(db, 'controls/feedBy')).then(bySnap => {
              const by = bySnap.val() || 'whnvr';
              if (by === 'audience') {
                setDebug('@anonymous_' + _randomCreature() + ' fed the fish!', 'audience');
              } else {
                setDebug('@whnvr just fed the fish!');
              }
            });
          }
        }
      });

      // ---- pump trigger ----
      let lastPumpCount = null;
      onValue(ref(db, 'controls/pump'), (snap) => {
        const v = snap.val();
        if (typeof v === 'number') {
          if (lastPumpCount === null) { lastPumpCount = v; }
          else if (v !== lastPumpCount) { lastPumpCount = v; window.triggerPump(); setDebug('@whnvr just pumped the water!'); }
        }
      });

      // ---- manual clear-out now ----
      onValue(ref(db, 'controls/clearNow'), (snap) => {
        const v = snap.val();
        if (typeof v === 'number') {
          if (window.lastClearNowCount == null) { window.lastClearNowCount = v; }
          else if (v !== window.lastClearNowCount) { window.lastClearNowCount = v; window.manualClearOut(); setDebug('@whnvr just cleared out the tank!'); }
        }
      });

      // ---- shake ----
      onValue(ref(db, 'controls/shake'), (snap) => {
        const v = snap.val();
        if (typeof v === 'number') {
          if (window.lastShakeCount == null) { window.lastShakeCount = v; }
          else if (v !== window.lastShakeCount) {
            window.lastShakeCount = v;
            window.shakeNearby();
            const lastWord = window.getLastPillText ? window.getLastPillText() : null;
            setDebug(lastWord ? '@whnvr just shook "' + lastWord + '"!' : '@whnvr just shook the tank!');
          }
        }
      });

      // ---- tank density cap ----
      onValue(ref(db, 'controls/densityCap'), (snap) => {
        const v = snap.val();
        if (typeof v === 'number') { window.setDensityCapVal(v); logChange('densityCap', '@whnvr just changed density cap to ' + v + '!'); }
      });

      // ---- ambient glow intensity ----
      onValue(ref(db, 'controls/glowIntensity'), (snap) => {
        const v = snap.val();
        if (typeof v === 'number') { window.setGlowIntensity(v); logChange('glow', '@whnvr just changed glow to ' + v.toFixed(2) + '!'); }
      });

      // ---- shrink after (minutes) ----
      onValue(ref(db, 'controls/shrinkAfterMinutes'), (snap) => {
        const v = snap.val();
        if (typeof v === 'number') { window.setShrinkAfterMinutes(v); logChange('shrink', '@whnvr just changed shrink after to ' + v + ' min!'); }
      });

      // ---- no shrink toggle ----
      onValue(ref(db, 'controls/noShrink'), (snap) => {
        const v = snap.val();
        if (typeof v === 'boolean') { window.setNoShrink(v); logChange('noShrink', '@whnvr just turned ' + (v ? 'on' : 'off') + ' no-shrink mode!'); }
      });

      // ---- shrink min scale ----
      onValue(ref(db, 'controls/shrinkMinScale'), (snap) => {
        const v = snap.val();
        if (typeof v === 'number') { window.setShrinkMinScale(v); logChange('shrinkMin', '@whnvr just changed shrink min to ' + v.toFixed(2) + '!'); }

      // ---- reset fish stomachs ----
      let _lastResetStomach = null;
      onValue(ref(db, 'controls/resetStomach'), (snap) => {
        const v = snap.val();

      let _rmousePrevActive = false;
      onValue(ref(db, 'controls/mouse'), (snap) => {
        const v = snap.val();
        if (v && typeof v.x === 'number') {
          window.remoteMouse.x = v.x;
          window.remoteMouse.y = v.y;
          window.remoteMouse.active = v.active === true;
          if (v.active && !_rmousePrevActive) {
            // drag just started — fresh read so mode change never races
            if (typeof window.playRippleSound === 'function') window.playRippleSound();
            get(ref(db, 'controls/mouseInteraction')).then(mSnap => {

              const action = mode === 'repel' ? 'repelled the'
                           : mode === 'none'  ? 'stopped interacting with the'
                           :                    'attracted the';
              setDebug('@whnvr just ' + action + ' fish!');
            });
          }
          _rmousePrevActive = v.active === true;
        } else {
          window.remoteMouse.active = false;
          _rmousePrevActive = false;
        }
      });

      // ---- fish flocking controls ----
      onValue(ref(db, 'controls/fishCount'), (snap) => {
        const v = snap.val();
        if (typeof v === 'number') { window.controls.set('fishCount', v); logChange('fishCount', '@whnvr just changed fish count to ' + v + '!'); }
      });
      onValue(ref(db, 'controls/fishSize'), (snap) => {
        const v = snap.val();
        if (typeof v === 'number') { window.controls.set('fishSize', v); logChange('fishSize', '@whnvr just changed fish size to ' + v + '!'); }
      });
      onValue(ref(db, 'controls/cohesion'), (snap) => {
        const v = snap.val();
        if (typeof v === 'number') { window.controls.set('cohesion', v); logChange('cohesion', '@whnvr just changed cohesion to ' + v + '!'); }
      });
      onValue(ref(db, 'controls/separation'), (snap) => {
        const v = snap.val();
        if (typeof v === 'number') { window.controls.set('separation', v); logChange('separation', '@whnvr just changed separation to ' + v + '!'); }
      });
      onValue(ref(db, 'controls/alignment'), (snap) => {
        const v = snap.val();
        if (typeof v === 'number') { window.controls.set('alignment', v); logChange('alignment', '@whnvr just changed alignment to ' + v + '!'); }
      });
      onValue(ref(db, 'controls/fishSpeed'), (snap) => {
        const v = snap.val();
        if (typeof v === 'number') { window.controls.set('fishSpeed', v); logChange('fishSpeed', '@whnvr just changed swim speed to ' + v + '!'); }
      });
      onValue(ref(db, 'controls/mouseInteraction'), (snap) => {
        const v = snap.val();
        if (typeof v === 'string') { window.controls.set('mouseInteraction', v); logChange('mouseMode', '@whnvr just set mouse to ' + v + '!'); }
      });
      onValue(ref(db, 'controls/showTrails'), (snap) => {
        const v = snap.val();
        if (typeof v === 'boolean') { window.controls.set('showTrails', v); logChange('trails', '@whnvr just turned ' + (v ? 'on' : 'off') + ' water trails!'); }
      });
      onValue(ref(db, 'controls/nightMode'), (snap) => {
        const v = snap.val();
        if (typeof v === 'boolean') { window.setNightMode(v); logChange('nightMode', '@whnvr just turned ' + (v ? 'on' : 'off') + ' night mode!'); }
      });

      // ---- sound volume ----
      onValue(ref(db, 'controls/soundVolume'), (snap) => {
        const v = snap.val();
        if (typeof v === 'number') { window.setMasterVolume(v); logChange('soundVol', '@whnvr just set volume to ' + Math.round(v * 100) + '%!'); }
      });

      // ---- remote ripple from control.html (count pattern, same as pump/shake) ----
      let lastRippleCount = null;
      onValue(ref(db, 'controls/ripple'), (snap) => {
        const v = snap.val();
        if (v && typeof v.count === 'number') {
          if (lastRippleCount === null) { lastRippleCount = v.count; return; }
          if (v.count !== lastRippleCount) {
            lastRippleCount = v.count;
            window.triggerRipple(v.x ?? 0.5, v.y ?? 0.5);
            window.logAction('@whnvr just made a ripple!');

      });

      // ---- persist pill layout to Firebase on every save ----
      // debounced so rapid drops/pumps don't flood writes
      let _saveTimer = null;
      window._onPillsStateSaved = (stateData) => {
        clearTimeout(_saveTimer);
        _saveTimer = setTimeout(() => {
          set(ref(db, 'state/pills'), stateData).catch(() => {});
        }, 1500);
      };
    });
