<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>NN-WHNVR — Display</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }

    .frame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      /* crossfade duration — adjust to taste */
      transition: opacity 1.8s ease;
    }

    #curtain-frame { z-index: 1; }
    #tank-frame    { z-index: 2; }
  </style>
</head>
<body>

  <iframe class="frame" id="curtain-frame" src="curtain.html"></iframe>
  <!-- tank src set lazily via prewarmTank or activeVisual switch -->
  <iframe class="frame" id="tank-frame"></iframe>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
    import { getDatabase, ref, onValue }
      from "https://www.gstatic.com/firebasejs/12.2.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAPA5EGbTXMnRJ5uX4O3JvJdCrtSHr5LHQ",
      authDomain: "nn-whnvr.firebaseapp.com",
      databaseURL: "https://nn-whnvr-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "nn-whnvr",
      storageBucket: "nn-whnvr.firebasestorage.app",
      messagingSenderId: "82298055324",
      appId: "1:82298055324:web:2380ad13ff2bd3e7591b59"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);

    const curtainFrame = document.getElementById('curtain-frame');
    const tankFrame    = document.getElementById('tank-frame');

    let ready         = false;
    let currentVisual = 'curtain';
    let tankLoaded    = false;
    let tankPrewarm   = false; // true = loaded & running in background at opacity 0.001

    function loadTank() {
      if (tankLoaded) return;
      tankLoaded = true;
      tankFrame.src = 'nn-fishtank.html';
    }

    // Apply correct opacity + audio/loop state to the tank based on all three states
    function refreshTank() {
      if (!tankLoaded) return;
      const isActive = currentVisual === 'tank';
      if (isActive) {
        // Fully visible and running
        tankFrame.style.opacity       = '1';
        tankFrame.style.pointerEvents = 'auto';
        try { tankFrame.contentWindow.postMessage({type: 'unmute'}, '*'); } catch(e) {}
        try { tankFrame.contentWindow.postMessage({type: 'resume'}, '*'); } catch(e) {}
      } else if (tankPrewarm) {
        // Running in background — opacity 0.001 prevents Chrome from throttling rAF
        tankFrame.style.opacity       = '0.001';
        tankFrame.style.pointerEvents = 'none';
        try { tankFrame.contentWindow.postMessage({type: 'mute'  }, '*'); } catch(e) {}
        try { tankFrame.contentWindow.postMessage({type: 'resume'}, '*'); } catch(e) {}
      } else {
        // Idle — paused and invisible
        tankFrame.style.opacity       = '0';
        tankFrame.style.pointerEvents = 'none';
        try { tankFrame.contentWindow.postMessage({type: 'mute'  }, '*'); } catch(e) {}
        try { tankFrame.contentWindow.postMessage({type: 'pause' }, '*'); } catch(e) {}
      }
    }

    curtainFrame.addEventListener('load', () => {
      const active = currentVisual === 'curtain';
      try { curtainFrame.contentWindow.postMessage({type: active ? 'unmute' : 'mute' }, '*'); } catch(e) {}
      try { curtainFrame.contentWindow.postMessage({type: active ? 'resume' : 'pause'}, '*'); } catch(e) {}
    });
    tankFrame.addEventListener('load', () => { refreshTank(); });

    function applyVisual(visual, animate) {
      const showTank = visual === 'tank';
      if (showTank) { loadTank(); tankPrewarm = false; }

      if (!animate) {
        curtainFrame.style.transition = 'none';
        tankFrame.style.transition    = 'none';
      }

      curtainFrame.style.opacity       = showTank ? '0' : '1';
      curtainFrame.style.pointerEvents = showTank ? 'none' : 'auto';
      try { curtainFrame.contentWindow.postMessage({type: showTank ? 'mute'  : 'unmute'}, '*'); } catch(e) {}
      try { curtainFrame.contentWindow.postMessage({type: showTank ? 'pause' : 'resume'}, '*'); } catch(e) {}

      refreshTank();

      if (!animate) {
        requestAnimationFrame(() => requestAnimationFrame(() => {
          curtainFrame.style.transition = '';
          tankFrame.style.transition    = '';
          ready = true;
        }));
      }
    }

    onValue(ref(db, 'settings/prewarmTank'), snap => {
      const on = snap.val() === true;
      if (on) loadTank();
      tankPrewarm = on;
      if (currentVisual !== 'tank') refreshTank();
    });

    onValue(ref(db, 'settings/activeVisual'), snap => {
      currentVisual = snap.val() || 'curtain';
      applyVisual(currentVisual, ready);
    });
  </script>

</body>
</html>
