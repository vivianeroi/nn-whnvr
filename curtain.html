    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #000;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }
    canvas { 
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: none;
    }

    /* ── Spotlight overlay ───────────────────────────────────────────────── */
    #spotlight {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 10;
      background: radial-gradient(ellipse at center, #111 0%, #000 70%);
      align-items: center;
      justify-content: center;
    }
    #spotlight.active { display: flex; }

    #spotlight-strand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      animation: spotlightFade 2.8s ease forwards;
    }
    @keyframes spotlightFade {
      0%   { opacity: 0; }
      10%  { opacity: 1; }
      82%  { opacity: 1; }
      100% { opacity: 0; }
    }
    @keyframes marbleDrop {
      0%   { transform: translateY(-140px) scale(0.3) rotate(-18deg); opacity: 0; }
      52%  { transform: translateY(18px)  scale(1.14) rotate(5deg);  opacity: 1; }
      68%  { transform: translateY(-9px)  scale(0.96) rotate(-2deg); }
      82%  { transform: translateY(6px)   scale(1.02) rotate(1deg);  }
      100% { transform: translateY(0)     scale(1)    rotate(0deg);  opacity: 1; }
    }

    .sp-bead {
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: monospace;
      font-weight: bold;
      color: rgba(0,0,0,0.75);
      flex-shrink: 0;
      opacity: 0;
      animation: marbleDrop 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    /* ── Console log overlay ─────────────────────────────────────────────── */
    #console-log {
      position: fixed;
      bottom: 20px;
      left: 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      z-index: 9;
      pointer-events: none;
    }
    .clog {
      background: rgba(0,0,0,0.62);
      color: #9adfc8;
      font-family: monospace;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 5px;
      transition: opacity 1.4s;
      opacity: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 420px;
    }
    .clog.fading { opacity: 0; }
    .clog-panel {
      color: #00EEC8;
      font-style: italic;
      font-weight: bold;
    }
    .clog-poke { color: #ffffff; }

</head>

// ─── Vec2 ────────────────────────────────────────────────────────────────────
class Vec2 {
  constructor(x=0,y=0){this.x=x;this.y=y;}
  set(x,y){this.x=x;this.y=y;return this;}
  clone(){return new Vec2(this.x,this.y);}
  sub(v){this.x-=v.x;this.y-=v.y;return this;}
  subNew(v){return this.clone().sub(v);}
}

const SHAPES = ['round','flat-diamond','oval','flat-triangle','barrel',
                'teardrop','heart','star','drum','octagon','hexagon','emerald-cut'];

// Font varieties — matched to Winnie's fish tank
const LATIN_FONTS = [
  'Courier New','Arial','Arial Black','Verdana',
  'Noto Sans','Noto Serif','Inter','Nunito','Poppins',
];
const CJK_FONTS = [
  "'Noto Sans TC','PingFang TC',sans-serif",
  "'Noto Sans SC','Microsoft YaHei',sans-serif",
  "'Noto Sans TC','Noto Sans SC',sans-serif",
  "'Noto Serif TC',serif",
  "'PingFang TC','Noto Sans TC',sans-serif",
  "'Microsoft JhengHei','Noto Sans TC',sans-serif",
];
function isCJK(txt) {
  return /[぀-ヿ㐀-䶿一-鿿豈-﫿ｦ-ﾟ]/.test(txt);
}
function randomFont(txt) {
  const pool = isCJK(txt) ? CJK_FONTS : LATIN_FONTS;
  return pool[Math.floor(Math.random() * pool.length)];
}

// Adds the shape outline to the current canvas path (caller does beginPath/fill)
function traceShape(oc, shape, cx, cy, r) {
  switch(shape) {
    case 'round':
      oc.arc(cx, cy, r, 0, Math.PI*2);
      break;
    case 'oval':
      // 90° rotated → vertical oval, bigger
      oc.ellipse(cx, cy, r*0.68, r*1.15, 0, 0, Math.PI*2);
      break;
    case 'flat-diamond':
      // 90° rotated → tall vertical diamond, bigger
      oc.moveTo(cx,          cy - r*1.1);
      oc.lineTo(cx + r*0.82, cy);
      oc.lineTo(cx,          cy + r*1.1);
      oc.lineTo(cx - r*0.82, cy);
      oc.closePath();
      break;
    case 'flat-triangle':
      // 90° CW → tip points down, wide base at top, bigger
      oc.moveTo(cx,           cy + r*1.1);   // tip at bottom
      oc.lineTo(cx - r*1.05,  cy - r*0.62);  // top-left
      oc.lineTo(cx + r*1.05,  cy - r*0.62);  // top-right
      oc.closePath();
      break;
    case 'barrel':
      // 90° rotated → vertical capsule (standing pill), bigger
      { const bh = r*0.62; oc.roundRect(cx-bh, cy-r*1.05, bh*2, r*2.1, bh); }
      break;
    case 'teardrop':
      // tip at top, large round bottom — wider & taller so the visual centre ≈ cy
      oc.moveTo(cx, cy - r*1.08);
      oc.bezierCurveTo(cx+r*1.05, cy-r*0.15, cx+r*1.05, cy+r*0.7, cx, cy+r*1.05);
      oc.bezierCurveTo(cx-r*1.05, cy+r*0.7, cx-r*1.05, cy-r*0.15, cx, cy-r*1.08);
      oc.closePath();
      break;
    case 'heart':
      // Two upper lobes meeting at centre dip, narrowing to bottom tip
      oc.moveTo(cx, cy + r);
      oc.bezierCurveTo(cx+r*0.1,  cy+r*0.6, cx+r*1.2, cy-r*0.1, cx+r*0.55, cy-r*0.6);
      oc.bezierCurveTo(cx+r*1.1,  cy-r*1.1, cx+r*0.1, cy-r*1.0, cx,        cy-r*0.7);
      oc.bezierCurveTo(cx-r*0.1,  cy-r*1.0, cx-r*1.1, cy-r*1.1, cx-r*0.55, cy-r*0.6);
      oc.bezierCurveTo(cx-r*1.2,  cy-r*0.1, cx-r*0.1, cy+r*0.6, cx,        cy+r);
      oc.closePath();
      break;
    case 'star': {
      // 5-pointed star — outer radius scaled up so the centre area is roomier
      const oR = r * 1.25, iR = r * 0.52;
      for (let i = 0; i < 10; i++) {
        const a = (i / 10) * Math.PI * 2 - Math.PI / 2;
        const rad = i % 2 === 0 ? oR : iR;
        (i === 0 ? oc.moveTo : oc.lineTo).call(oc, cx + Math.cos(a)*rad, cy + Math.sin(a)*rad);
      }
      oc.closePath();
      break;
    }
    case 'drum':
      { const dw = r*0.72; oc.roundRect(cx-dw, cy-r, dw*2, r*2, dw*0.18); }
      break;
    case 'octagon':
      for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2-Math.PI/8; (i?oc.lineTo:oc.moveTo).call(oc,cx+r*Math.cos(a),cy+r*Math.sin(a));} oc.closePath();
      break;
    case 'hexagon':
      for(let i=0;i<6;i++){const a=(i/6)*Math.PI*2-Math.PI/6; (i?oc.lineTo:oc.moveTo).call(oc,cx+r*Math.cos(a),cy+r*Math.sin(a));} oc.closePath();
      break;
    case 'emerald-cut':
      { const ew=r*0.72,eh=r,ec=r*0.28;
        oc.moveTo(cx-ew+ec, cy-eh); oc.lineTo(cx+ew-ec, cy-eh);
        oc.lineTo(cx+ew,    cy-eh+ec); oc.lineTo(cx+ew,    cy+eh-ec);
        oc.lineTo(cx+ew-ec, cy+eh); oc.lineTo(cx-ew+ec, cy+eh);
        oc.lineTo(cx-ew,    cy+eh-ec); oc.lineTo(cx-ew,    cy-eh+ec);
        oc.closePath(); }
      break;
  }
}

// ─── Particle ────────────────────────────────────────────────────────────────
class Particle {
  constructor(x,y,pinned,char,color,shape='round',radius=null,font='monospace'){
    this.pos    = new Vec2(x,y);
    this.old    = new Vec2(x,y);
    this.ax=0; this.ay=0;
    this.pinned = pinned;
    this.char   = char;
    this.color  = color;
    this.shape  = shape;
    this.radius = radius; // null → use CONFIG.BEAD_RADIUS
    this.font   = font;
    this.downConstraint = null;
  }
  update(){
    if(this.pinned){this.ax=0;this.ay=0;return;}
    const vx=(this.pos.x-this.old.x)*0.985;
    const vy=(this.pos.y-this.old.y)*0.985;
    this.old.set(this.pos.x,this.pos.y);
    this.pos.x+=vx+this.ax;
    this.pos.y+=vy+this.ay+0.18;
    this.ax=0;this.ay=0;
  }
  push(fx,fy){this.ax+=fx;this.ay+=fy;}
}

// ─── Constraint ──────────────────────────────────────────────────────────────
class Constraint {
  constructor(p1,p2,len){this.p1=p1;this.p2=p2;this.len=len;}
  solve(){
    const dx=this.p2.pos.x-this.p1.pos.x;
    const dy=this.p2.pos.y-this.p1.pos.y;
    const dist=Math.hypot(dx,dy)||0.001;
    const diff=(dist-this.len)/dist/2;
    const ox=dx*diff,oy=dy*diff;
    if(!this.p1.pinned){this.p1.pos.x+=ox;this.p1.pos.y+=oy;}
    if(!this.p2.pinned){this.p2.pos.x-=ox;this.p2.pos.y-=oy;}
  }
}

// Preload the 7 poster images (1.jpg … 7.jpg)
const POSTER_IMGS = Array.from({length:7}, (_,i) => {
  const img = new Image();
  img.src = `${i+1}.jpg`;
  return img;
});

function initPosters() {
  posterCards.length = 0;
  const n = 7;
  const slot = W / n;
  // Height scales with slot width (maintaining consistent poster shape), capped at ~22% screen height
  const baseH = Math.min(slot * 0.79, H * 0.22);
  for (let i = 0; i < n; i++) {
    const h = baseH + Math.random() * baseH * 0.12;
    const w = slot * (0.86 + Math.random() * 0.26);
    const x = slot * (i + 0.5) + (Math.random() - 0.5) * slot * 0.18;
    const y = h * 0.44 + (Math.random() - 0.5) * h * 0.08; // center scales with h
    posterCards.push({
      x, y, w, h,
      angle: (Math.random() - 0.5) * 0.08,
      grad: POSTER_GRADIENTS[i],
      img: POSTER_IMGS[i],
    });
  }
  // Curtain pins start just below the lowest poster bottom
  POSTER_H = Math.round(Math.max(...posterCards.map(p => p.y + p.h / 2)) + 8);
}

// Vintage-graphic fruit illustrations — flat/layered fills, minimal outlines
function drawFruitGraphic(ctx, type, r) {
  ctx.save();
  ctx.lineCap = 'round';
  switch(type) {

    case 'oranges': {
      [[-r*.32,r*.1],[r*.24,-r*.08]].forEach(([ox,oy],i)=>{
        // shadow
        ctx.fillStyle='rgba(0,0,0,.10)';
        ctx.beginPath(); ctx.arc(ox+r*.06,oy+r*.09,r*.52,0,Math.PI*2); ctx.fill();
        // body — no stroke, two-tone fill
        ctx.fillStyle=i?'#F09030':'#E07020';
        ctx.beginPath(); ctx.arc(ox,oy,r*.5,0,Math.PI*2); ctx.fill();
        ctx.fillStyle=i?'#E07820':'#C85C10';
        ctx.beginPath(); ctx.arc(ox+r*.18,oy+r*.18,r*.22,0,Math.PI*2); ctx.fill();
        // highlight
        ctx.fillStyle='rgba(255,255,255,.32)';
        ctx.beginPath(); ctx.arc(ox-r*.18,oy-r*.18,r*.15,0,Math.PI*2); ctx.fill();
      });
      // leaf — no outline
      ctx.fillStyle='#287030';
      ctx.beginPath(); ctx.ellipse(r*.5,-r*.5,r*.22,r*.1,-.55,0,Math.PI*2); ctx.fill();
      break;
    }

    case 'chineseherbs': {
      // Star anise (八角) — 8 petals, no stroke
      const p8=8;
      for(let i=0;i<p8;i++){
        ctx.save(); ctx.rotate((i/p8)*Math.PI*2);
        ctx.fillStyle=i%2?'#7A340C':'#9A4414';
        ctx.beginPath(); ctx.ellipse(0,-r*.36,r*.13,r*.28,0,0,Math.PI*2); ctx.fill();
        ctx.restore();
      }
      ctx.fillStyle='#C06018';
      ctx.beginPath(); ctx.arc(0,0,r*.17,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#E08030';
      ctx.beginPath(); ctx.arc(0,0,r*.09,0,Math.PI*2); ctx.fill();
      // Goji berries (枸杞)
      [[-r*.65,r*.52],[r*.6,r*.44],[-r*.58,-r*.5],[r*.62,-r*.42],[r*.04,r*.6]].forEach(([bx,by])=>{
        ctx.fillStyle='rgba(0,0,0,.1)';
        ctx.beginPath(); ctx.ellipse(bx+r*.03,by+r*.04,r*.11,r*.08,.3,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#C81020';
        ctx.beginPath(); ctx.ellipse(bx,by,r*.1,r*.07,.3,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='rgba(255,255,255,.25)';
        ctx.beginPath(); ctx.arc(bx-r*.04,by-r*.03,r*.04,0,Math.PI*2); ctx.fill();
      });
      break;
    }

    case 'passionfruit': {
      // Whole fruit left — no outline
      ctx.fillStyle='#501880';
      ctx.beginPath(); ctx.arc(-r*.3,r*.04,r*.46,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#6820A0';
      ctx.beginPath(); ctx.arc(-r*.38,-r*.06,r*.26,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,.15)';
      ctx.beginPath(); ctx.arc(-r*.48,-r*.14,r*.16,0,Math.PI*2); ctx.fill();
      // Half cut right — layered fills, no stroke
      ctx.fillStyle='#6828A8';
      ctx.beginPath(); ctx.arc(r*.3,0,r*.46,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#DDD8C0';
      ctx.beginPath(); ctx.arc(r*.3,0,r*.37,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#D8A018';
      ctx.beginPath(); ctx.arc(r*.3,0,r*.28,0,Math.PI*2); ctx.fill();
      // Pulp sacs + seeds radially
      for(let i=0;i<9;i++){
        const a=(i/9)*Math.PI*2;
        const sx=r*.3+Math.cos(a)*r*.18, sy=Math.sin(a)*r*.18;
        ctx.fillStyle='#E8C030';
        ctx.beginPath(); ctx.arc(sx,sy,r*.075,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#100808';
        ctx.beginPath(); ctx.ellipse(sx,sy,r*.032,r*.058,a,0,Math.PI*2); ctx.fill();
      }
      // centre pip
      ctx.fillStyle='#E8B010';
      ctx.beginPath(); ctx.arc(r*.3,0,r*.06,0,Math.PI*2); ctx.fill();
      break;
    }

    case 'starfruit': {
      // 楊桃 cross-section — 5-point star, no stroke
      const pts=5, oR=r*.82, iR=r*.34;
      // darker outer fill first
      ctx.fillStyle='#A8A008';
      ctx.beginPath();
      for(let i=0;i<pts*2;i++){
        const a=(i/(pts*2))*Math.PI*2-Math.PI/2;
        const rad=i%2===0?oR*1.04:iR*.92;
        i===0?ctx.moveTo(Math.cos(a)*rad,Math.sin(a)*rad):ctx.lineTo(Math.cos(a)*rad,Math.sin(a)*rad);
      }
      ctx.closePath(); ctx.fill();
      // main star
      ctx.fillStyle='#D8D010';
      ctx.beginPath();
      for(let i=0;i<pts*2;i++){
        const a=(i/(pts*2))*Math.PI*2-Math.PI/2;
        const rad=i%2===0?oR:iR;
        i===0?ctx.moveTo(Math.cos(a)*rad,Math.sin(a)*rad):ctx.lineTo(Math.cos(a)*rad,Math.sin(a)*rad);
      }
      ctx.closePath(); ctx.fill();
      // inner lighter star
      ctx.fillStyle='#F0E828';
      ctx.beginPath();
      for(let i=0;i<pts*2;i++){
        const a=(i/(pts*2))*Math.PI*2-Math.PI/2;
        const rad=i%2===0?oR*.68:iR*.68;
        i===0?ctx.moveTo(Math.cos(a)*rad,Math.sin(a)*rad):ctx.lineTo(Math.cos(a)*rad,Math.sin(a)*rad);
      }
      ctx.closePath(); ctx.fill();
      // centre highlight
      ctx.fillStyle='#FDFAA0';
      ctx.beginPath(); ctx.arc(0,0,r*.12,0,Math.PI*2); ctx.fill();
      break;
    }

    case 'apple': {
      // shadow
      ctx.fillStyle='rgba(0,0,0,.1)';
      ctx.beginPath(); ctx.arc(r*.06,r*.16,r*.56,0,Math.PI*2); ctx.fill();
      // body — no stroke
      ctx.fillStyle='#C01818';
      ctx.beginPath(); ctx.arc(0,r*.08,r*.55,0,Math.PI*2); ctx.fill();
      // darker side shadow
      ctx.fillStyle='#901010';
      ctx.beginPath(); ctx.arc(r*.2,r*.2,r*.32,0,Math.PI*2); ctx.fill();
      // top dent
      ctx.fillStyle='rgba(0,0,0,.18)';
      ctx.beginPath(); ctx.arc(0,-r*.44,r*.14,0,Math.PI*2); ctx.fill();
      // stem
      ctx.strokeStyle='#583810'; ctx.lineWidth=r*.08; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(0,-r*.52); ctx.lineTo(r*.08,-r*.78); ctx.stroke();
      // leaf — no outline
      ctx.fillStyle='#288028';
      ctx.beginPath(); ctx.ellipse(r*.26,-r*.72,r*.26,r*.11,-.5,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#40A840';
      ctx.beginPath(); ctx.ellipse(r*.2,-r*.7,r*.12,r*.06,-.5,0,Math.PI*2); ctx.fill();
      // highlight
      ctx.fillStyle='rgba(255,255,255,.28)';
      ctx.beginPath(); ctx.ellipse(-r*.2,-r*.1,r*.14,r*.24,-.3,0,Math.PI*2); ctx.fill();
      break;
    }

    case 'grapes': {
      const gr=r*.22;
      [[-.3,0],[.3,0],[0,-.95],[-.6,-.95],[.6,-.95],[0,-1.9],[-.6,-1.9]].forEach(([gx,gy])=>{
        const cx=gx*gr*1.65-r*.05, cy=gy*gr*1.6+r*.4;
        // shadow fill, no stroke
        ctx.fillStyle='rgba(0,0,0,.09)';
        ctx.beginPath(); ctx.arc(cx+gr*.18,cy+gr*.18,gr,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#5828A0';
        ctx.beginPath(); ctx.arc(cx,cy,gr,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#7038C0';
        ctx.beginPath(); ctx.arc(cx-gr*.15,cy-gr*.15,gr*.55,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='rgba(255,255,255,.26)';
        ctx.beginPath(); ctx.arc(cx-gr*.3,cy-gr*.3,gr*.28,0,Math.PI*2); ctx.fill();
      });
      ctx.strokeStyle='#504020'; ctx.lineWidth=r*.06; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(-r*.05,-r*.55); ctx.lineTo(r*.05,-r*.82); ctx.stroke();
      ctx.fillStyle='#308040';
      ctx.beginPath(); ctx.ellipse(r*.26,-r*.8,r*.28,r*.12,-.55,0,Math.PI*2); ctx.fill();
      break;
    }

    case 'watermelon': {
      const wy=r*.1;
      // green rind — thin same-hue stroke only
      ctx.fillStyle='#307820';
      ctx.beginPath(); ctx.arc(0,wy,r*.72,Math.PI,0); ctx.closePath(); ctx.fill();
      ctx.strokeStyle='#1a5010'; ctx.lineWidth=r*.04;
      ctx.beginPath(); ctx.arc(0,wy,r*.72,Math.PI,0); ctx.closePath(); ctx.stroke();
      // lighter stripe pattern on rind
      ctx.fillStyle='#488830';
      ctx.beginPath(); ctx.arc(0,wy,r*.68,Math.PI+.22,-.22); ctx.arc(0,wy,r*.56,-.22,Math.PI+.22,true); ctx.closePath(); ctx.fill();
      // white rind
      ctx.fillStyle='#D4F0A8';
      ctx.beginPath(); ctx.arc(0,wy,r*.6,Math.PI,0); ctx.closePath(); ctx.fill();
      // flesh — no stroke
      ctx.fillStyle='#E02028';
      ctx.beginPath(); ctx.arc(0,wy,r*.5,Math.PI,0); ctx.closePath(); ctx.fill();
      // seeds
      ctx.fillStyle='#18140C';
      [[-r*.28,wy-r*.14],[0,wy-r*.24],[r*.28,wy-r*.14],[-r*.14,wy-r*.36],[r*.14,wy-r*.36]].forEach(([sx,sy])=>{
        ctx.beginPath(); ctx.ellipse(sx,sy,r*.038,r*.072,.2,0,Math.PI*2); ctx.fill();
      });
      break;
    }
  }
  ctx.restore();
}
// initPosters() called after posterCards is declared (below)

function drawPostersRow() {
  const dpr = window.devicePixelRatio || 1;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  posterCards.forEach(p => {
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.angle);

    // Drop shadow
    ctx.fillStyle = 'rgba(0,0,0,0.30)';
    ctx.fillRect(-p.w/2 + 4, -p.h/2 + 4, p.w, p.h);

    // Build gradient
    const g = p.grad;
    const hw = p.w / 2, hh = p.h / 2;
    const maxR = Math.sqrt(hw * hw + hh * hh) * 0.9;

    if (g.type === 'radial') {
      const sx = g.scaleX || 1, sy = g.scaleY || 1;
      // Clip to poster rect so a tilted/scaled gradient never paints outside
      ctx.save();
      ctx.beginPath(); ctx.rect(-hw, -hh, p.w, p.h); ctx.clip();
      ctx.save();
      if (g.rotateG) ctx.rotate(g.rotateG);
      ctx.scale(sx, sy);
      const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, maxR / Math.max(sx, sy));
      g.stops.forEach(([t, c]) => grad.addColorStop(t, c));
      ctx.fillStyle = grad;
      const big = 1200; // guaranteed to cover poster after any transform
      ctx.fillRect(-big, -big, big * 2, big * 2);
      ctx.restore(); // remove gradient transform
      ctx.restore(); // remove clip
    } else {
      const grad = g.type === 'linear-v'
        ? ctx.createLinearGradient(0, -hh, 0, hh)
        : ctx.createLinearGradient(-hw, -hh, hw, hh);
      g.stops.forEach(([t, c]) => grad.addColorStop(t, c));
      ctx.fillStyle = grad;
      ctx.fillRect(-hw, -hh, p.w, p.h);
    }

    // Fruit illustration centred on the poster
    // Draw the actual poster image filling the card (cover fit)
    if (p.img && p.img.complete && p.img.naturalWidth > 0) {
      ctx.save();
      ctx.beginPath(); ctx.rect(-hw, -hh, p.w, p.h); ctx.clip();
      const ir = p.img.naturalWidth / p.img.naturalHeight;
      const pr = p.w / p.h;
      let sx=0,sy=0,sw=p.img.naturalWidth,sh=p.img.naturalHeight;
      if (ir > pr) { sw = sh*pr; sx = (p.img.naturalWidth-sw)/2; }
      else          { sh = sw/pr; sy = p.img.naturalHeight-sh; } // anchor bottom → top gets cropped
      ctx.drawImage(p.img, sx, sy, sw, sh, -hw, -hh, p.w, p.h);
      ctx.restore();
    }

    // Subtle border (always at original transform)
    ctx.strokeStyle = 'rgba(0,0,0,0.18)';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(-hw, -hh, p.w, p.h);

    ctx.restore();
  });
}

// ─── Market stall scene ───────────────────────────────────────────────────────






// ─── State ───────────────────────────────────────────────────────────────────
const strands        = [];
const allParticles   = [];
const allConstraints = [];
let strandCount      = 0;
const posterCards    = [];     // pre-generated poster placeholder rectangles
initPosters();                 // safe to call now that posterCards is declared
let highlightStrand  = null;   // strand to glow after it enters the curtain
let highlightUntil   = 0;
const HIGHLIGHT_MS   = 12000;

// ─── Char canvas cache ────────────────────────────────────────────────────────
const charCache = {};
function getCharCanvas(ch, color, shape='round', radius=null, font='monospace') {
  const r   = radius !== null ? radius : CONFIG.BEAD_RADIUS;
  const key = ch + color + r + CONFIG.GLOW_RADIUS + shape + font;
  if (charCache[key]) return charCache[key];
  const glow = Math.round(r * CONFIG.GLOW_RADIUS);
  const size = r * 2 + 4 + glow * 2;
  const cx = size / 2, cy = size / 2;
  const off  = document.createElement('canvas');
  off.width  = off.height = size;
  const oc   = off.getContext('2d');

  // Shape-following glow: blur a filled copy of the shape so the halo
  // matches the bead outline rather than always being a circle
  if (glow > 0) {
    const blurPx = Math.max(1, Math.round(glow * 0.4));
    oc.save();
    oc.filter = `blur(${blurPx}px)`;
    oc.beginPath(); traceShape(oc, shape, cx, cy, r);
    oc.fillStyle = color + 'cc';
    oc.fill();
    oc.filter = 'none';
    oc.restore();
  }

  // Main shaped fill
  oc.beginPath(); traceShape(oc, shape, cx, cy, r);
  oc.fillStyle=color; oc.fill();

  // Specular highlight — position adjusted per shape
  const hlX = cx - r*0.25;
  const hlY = shape==='flat-triangle' ? cy-r*0.28   // toward wide top
            : shape==='heart'         ? cy-r*0.45   // in the upper lobes
            : cy-r*0.25;                            // default: upper area
  oc.beginPath(); oc.arc(hlX, hlY, r*0.32, 0, Math.PI*2);
  oc.fillStyle='rgba(255,255,255,0.38)'; oc.fill();

  // All shapes centered — no per-shape textY offset
  const textY = cy + 1;
  // Slightly smaller font across all shapes for visible padding from edges
  const fontSize = Math.round(r * 0.82);
  oc.save();
  oc.beginPath(); traceShape(oc, shape, cx, cy, r); oc.clip();
  // Append system emoji fonts so emoji glyphs render on all platforms
  oc.font=`bold ${fontSize}px ${font},"Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji"`;
  oc.textAlign='center'; oc.textBaseline='middle';
  oc.fillStyle='rgba(0,0,0,0.75)';
  oc.fillText(ch===' '?'·':ch, cx, textY);
  oc.restore();

  charCache[key]=off;
  return off;
}

// ─── Build and register a strand at a given x ────────────────────────────────
// Remembers [colorA, colorB] per Firebase note key so palette switches
// only affect strands added AFTER the change, not existing ones.
// Persisted in localStorage so colors survive page refreshes.
const strandColorStore = new Map();
(function() {
  try {
    const saved = JSON.parse(localStorage.getItem('nn-strandColors') || '{}');
    Object.entries(saved).forEach(([k, v]) => strandColorStore.set(k, v));
  } catch(e) {}
})();
function _saveColorStore() {
  try {
    const obj = {};
    strandColorStore.forEach((v, k) => { obj[k] = v; });
    localStorage.setItem('nn-strandColors', JSON.stringify(obj));
  } catch(e) {}
}

function buildStrand(text, color, x, noteKey = null) {
  const chars = [...text.trim()]; // spread handles emoji & multi-codepoint chars correctly

  // Re-use stored colors+shapes if seen before, so palette/spotlight matches.
  // Store format: {colorA, colorB, shapeA, shapeB} (old format was [colorA,colorB]).
  let colorA, colorB, shapeA, shapeB, strandFont;
  if (noteKey && strandColorStore.has(noteKey)) {
    const stored = strandColorStore.get(noteKey);
    if (Array.isArray(stored)) {          // legacy format — only colors stored
      [colorA, colorB] = stored;
      const ia = Math.floor(Math.random() * SHAPES.length);
      let ib; do { ib = Math.floor(Math.random() * SHAPES.length); } while (ib === ia);
      shapeA = SHAPES[ia]; shapeB = SHAPES[ib];
      strandFont = randomFont(text);
    } else {
      ({ colorA, colorB, shapeA, shapeB } = stored);
      strandFont = stored.font || randomFont(text);
    }
  } else {
    const cidxA = Math.floor(Math.random() * PALETTE.length);
    let cidxB;
    do { cidxB = Math.floor(Math.random() * PALETTE.length); } while (cidxB === cidxA);
    colorA = PALETTE[cidxA]; colorB = PALETTE[cidxB];
    const sidxA = Math.floor(Math.random() * SHAPES.length);
    let sidxB;
    do { sidxB = Math.floor(Math.random() * SHAPES.length); } while (sidxB === sidxA);
    shapeA = SHAPES[sidxA]; shapeB = SHAPES[sidxB];
    strandFont = randomFont(text);
    if (noteKey) {
      strandColorStore.set(noteKey, {colorA,colorB,shapeA,shapeB,font:strandFont});
      _saveColorStore();
      // Note: Firebase write happens only in onChildAdded (for new notes),
      // NOT here, so rebuilds never overwrite stored assignments with the current palette.
    }
  }

  const bs = beadSpacing(); // compute once from current radius

  const particles   = [];
  const constraints = [];
  for (let j = 0; j <= chars.length; j++) {
    const y      = POSTER_H + j * bs; // pins start below the poster row
    const pinned = j === 0;
    const char   = j === 0 ? null : chars[j-1];
    const shape  = j === 0 ? 'round' : (j % 2 === 1 ? shapeA : shapeB);
    const beadColor = j === 0 ? colorA : (j % 2 === 1 ? colorA : colorB);
    const p      = new Particle(x, y, pinned, char, beadColor, shape, null, strandFont);
    particles.push(p);
    allParticles.push(p);
    if (j > 0) {
      const con = new Constraint(particles[j-1], particles[j], bs);
      constraints.push(con);
      allConstraints.push(con);
      particles[j-1].downConstraint = con;
    }
  }

  // Decorative tail: 3 tiny round beads then a normal teardrop
  // Tiny beads use their own radius-derived spacing; drop uses main spacing
  let beadIdx = chars.length;
  const tinyR   = Math.max(4, Math.round(CONFIG.BEAD_RADIUS * 0.42));
  const tinyGap = tinyR * 2 + BEAD_GAP;
  let prevP = particles[particles.length - 1];
  for (let t = 0; t < 3; t++) {
    beadIdx++;
    const tc = beadIdx % 2 === 1 ? colorA : colorB;
    const tp = new Particle(x, prevP.pos.y + tinyGap, false, '·', tc, 'round', tinyR, strandFont);
    particles.push(tp); allParticles.push(tp);
    const c = new Constraint(prevP, tp, tinyGap);
    constraints.push(c); allConstraints.push(c);
    prevP.downConstraint = c;
    prevP = tp;
  }
  beadIdx++;
  const dropColor = beadIdx % 2 === 1 ? colorA : colorB;
  const dropP = new Particle(x, prevP.pos.y + bs, false, '·', dropColor, 'teardrop', null, strandFont);
  particles.push(dropP); allParticles.push(dropP);
  const dropCon = new Constraint(prevP, dropP, bs);
  constraints.push(dropCon); allConstraints.push(dropCon);
  prevP.downConstraint = dropCon;

  strands.push({ particles, constraints, color: colorA, text });
}

// ─── Spotlight: fullscreen reveal of the new strand while curtain rebuilds ───
// Returns inline CSS for a spotlight bead matching the given shape
function spotlightBeadCSS(shape, r, color) {
  const glow = `box-shadow:0 0 ${r}px ${color}99,0 0 ${r*2}px ${color}44;`;
  // font-family is set separately via bead.style.fontFamily; font-size matches curtain's r*0.82
  const base = `background:${color};color:rgba(0,0,0,0.75);font-weight:bold;font-size:${Math.round(r*0.82)}px;` +
               `flex-shrink:0;display:flex;align-items:center;justify-content:center;${glow}`;
  const s = r * 2;
  switch(shape) {
    case 'oval':
      return `${base}width:${Math.round(r*1.36)}px;height:${Math.round(r*2.3)}px;border-radius:50%;`;
    case 'flat-diamond':
      return `${base}width:${Math.round(r*1.64)}px;height:${Math.round(r*2.2)}px;clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);`;
    case 'flat-triangle':
      // Base is at top, tip at bottom — shift text up toward the wide area
      return `${base}width:${Math.round(r*2.1)}px;height:${Math.round(r*1.72)}px;clip-path:polygon(50% 100%,0% 0%,100% 0%);align-items:flex-start;padding-top:14%;font-size:${Math.round(r*0.76)}px;`;
    case 'barrel':
      return `${base}width:${Math.round(r*1.24)}px;height:${Math.round(r*2.1)}px;border-radius:${r}px;`;
    case 'teardrop':
      return `${base}width:${Math.round(r*1.76)}px;height:${Math.round(r*2.16)}px;border-radius:50% 50% 50% 50%/30% 30% 70% 70%;`;
    case 'heart': {
      const hw=Math.round(r*2), hh=Math.round(r*2.1);
      const path=`M${hw/2} ${hh} C${hw*0.55} ${hh*0.8} ${hw} ${hh*0.6} ${hw} ${hh*0.35} C${hw} ${hh*0.1} ${hw*0.8} 0 ${hw/2} ${hh*0.2} C${hw*0.2} 0 0 ${hh*0.1} 0 ${hh*0.35} C0 ${hh*0.6} ${hw*0.45} ${hh*0.8} ${hw/2} ${hh} Z`;
      return `${base}width:${hw}px;height:${hh}px;clip-path:path('${path}');`;
    }
    case 'star':
      // Central pentagon is smaller than full box — reduce font to fit
      return `${base}width:${s}px;height:${s}px;clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);font-size:${Math.round(r*0.68)}px;`;
    case 'drum':
      return `${base}width:${Math.round(r*1.44)}px;height:${s}px;border-radius:${Math.round(r*0.2)}px;`;
    case 'octagon':
      return `${base}width:${s}px;height:${s}px;clip-path:polygon(30% 0%,70% 0%,100% 30%,100% 70%,70% 100%,30% 100%,0% 70%,0% 30%);`;
    case 'hexagon':
      return `${base}width:${s}px;height:${s}px;clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);`;
    case 'emerald-cut':
      return `${base}width:${Math.round(r*1.44)}px;height:${s}px;clip-path:polygon(20% 0%,80% 0%,100% 20%,100% 80%,80% 100%,20% 100%,0% 80%,0% 20%);`;
    default: // round
      return `${base}width:${s}px;height:${s}px;border-radius:50%;`;
  }
}

function showSpotlight(text, colorA, colorB = colorA, shapeA = 'round', shapeB = 'round', font = 'monospace') {
  const strand = document.getElementById('spotlight-strand');
  strand.innerHTML = '';

  const chars = [...text.trim()];
  const maxVisible = Math.floor(window.innerHeight * 0.85 / 80);
  const visible = chars.slice(0, maxVisible);
  const r = Math.max(28, Math.min(56, Math.floor(window.innerHeight * 0.8 / visible.length / 2)));

  visible.forEach((ch, i) => {
    const color = i % 2 === 0 ? colorA : colorB;
    const shape = i % 2 === 0 ? shapeA  : shapeB;
    const bead = document.createElement('div');
    bead.className = 'sp-bead';
    bead.style.cssText = spotlightBeadCSS(shape, r, color);
    bead.style.fontFamily = font;
    bead.style.animationDelay = `${i * 0.14}s`;
    bead.textContent = ch === ' ' ? '·' : ch;
    strand.appendChild(bead);
  });

  strand.style.animation = 'none';
  strand.offsetHeight;
  strand.style.animation = '';

  const overlay = document.getElementById('spotlight');
  overlay.classList.add('active');
  setTimeout(() => {
    overlay.classList.remove('active');
    revealBurst();
  }, 2800);
}

// ─── Radial burst on curtain reveal ──────────────────────────────────────────
function revealBurst() {
  const cx = W / 2, cy = H / 3; // push from upper-centre (where beads live)
  const STRENGTH = 18;
  allParticles.forEach(p => {
    if (p.pinned) return;
    const dx = p.pos.x - cx;
    const dy = p.pos.y - cy;
    const d  = Math.hypot(dx, dy) || 1;
    // Radial push away from centre, plus a little random jitter
    const str = STRENGTH + Math.random() * 8;
    p.push((dx / d) * str + (Math.random() - 0.5) * 6,
           (dy / d) * str + (Math.random() - 0.5) * 6);
  });
}

// ─── In-place rebuild: re-fetches all notes and relays strands correctly ─────
async function rebuildCurtain() {
  strands.length = 0;
  allParticles.length = 0;
  allConstraints.length = 0;
  strandCount = 0;

  const snapshot = await get(ref(db, 'notes'));
  const existing = [];
  if (snapshot.exists()) {
    snapshot.forEach(child => {
      const d = child.val();
      if (d && d.text) existing.push({ key: child.key, text: d.text });
    });
  }

  if (existing.length > 0) {
    existing.forEach(({ key, text }) => {
      buildStrand(text, null, 0, key);
    });
    strandCount = existing.length;
    const n = strands.length;
    strands.forEach((s, i) => {
      const x = W - CONFIG.STRAND_SPACING * (n - i);
      s.particles.forEach(p => { p.pos.x = x; p.old.x = x; });
    });
  }
}

// ─── Snap every pin to its exact grid slot — only used on initial load ───────
function repositionPins() {
  const n = strands.length;
  strands.forEach((s, i) => {
    const pin = s.particles[0];
    pin.pos.x = W - CONFIG.STRAND_SPACING * (n - i);
    pin.old.x = pin.pos.x;
  });
}

// ─── Conveyor drift + teleport loop ──────────────────────────────────────────
function driftAndLoop() {
  if (strands.length === 0 || CONFIG.DRIFT_SPEED === 0) return;
  // Only pins drift; beads follow via constraints each frame
  strands.forEach(strand => {
    const pin = strand.particles[0];
    pin.pos.x -= CONFIG.DRIFT_SPEED;
    pin.old.x -= CONFIG.DRIFT_SPEED;
  });
  // Teleport any strand whose pin went too far left back to the right
  let maxX = -Infinity;
  strands.forEach(s => { const x = s.particles[0].pos.x; if (x > maxX) maxX = x; });
  let curMaxX = maxX;
  strands.forEach(strand => {
    const pin = strand.particles[0];
    if (pin.pos.x < -CONFIG.STRAND_SPACING * 2) {
      const targetX = curMaxX + CONFIG.STRAND_SPACING;
      const newX = targetX > 0 ? targetX : W + CONFIG.STRAND_SPACING;
      const dx = newX - pin.pos.x;
      strand.particles.forEach(p => { p.pos.x += dx; p.old.x += dx; });
      curMaxX = newX;
    }
  });
}

// ─── Load existing messages, spread across screen, then watch for new ones ───

async function initStrands() {
  // Load settings AND strand visual assignments from Firebase before building
  // strands — ensures every device (phone, desktop, projector) shows the same
  // colours, shapes and fonts regardless of local localStorage state.
  try {
    const [settingsSnap, strandDataSnap] = await Promise.all([
      get(ref(db, 'settings')),
      get(ref(db, 'strandData')),
    ]);
    if (settingsSnap.exists()) {
      const s = settingsSnap.val();
      if (s.beadRadius !== undefined) CONFIG.BEAD_RADIUS = s.beadRadius;
      if (s.driftSpeed !== undefined) CONFIG.DRIFT_SPEED = s.driftSpeed;
      if (s.glowRadius !== undefined) CONFIG.GLOW_RADIUS = s.glowRadius;
      if (s.hoverVol   !== undefined) CONFIG.HOVER_VOL   = s.hoverVol;
      if (s.pokeVol    !== undefined) CONFIG.POKE_VOL    = s.pokeVol;
      if (s.palette && PALETTES[s.palette]) PALETTE = PALETTES[s.palette];
    }
    // Populate local store from Firebase — Firebase is the source of truth
    if (strandDataSnap.exists()) {
      strandDataSnap.forEach(child => strandColorStore.set(child.key, child.val()));
      _saveColorStore();
    }
  } catch(e) {}

  // First: read all existing messages as a snapshot so we know the total count
  const snapshot = await get(ref(db, 'notes'));
  const existing = [];
  if (snapshot.exists()) {
    snapshot.forEach(child => {
      const d = child.val();
      if (d && d.text) existing.push({ key: child.key, text: d.text });
    });
  }

  const total = existing.length;

  if (total > 0) {
    existing.forEach(({ key, text }) => {
      buildStrand(text, null, 0, key);
    });
    strandCount = total;
    // Snap ALL particles (pins + beads) so initial load looks settled
    const n = strands.length;
    strands.forEach((s, i) => {
      const x = W - CONFIG.STRAND_SPACING * (n - i);
      s.particles.forEach(p => { p.pos.x = x; p.old.x = x; });
    });
  }

  let firedCount = 0;
  onChildAdded(ref(db, 'notes'), async snapshot => {
    firedCount++;
    if (firedCount <= total) return;
    const data = snapshot.val();
    if (!data || !data.text) return;

    const noteKey = snapshot.key;
    // Pre-pick colors + shapes so spotlight and actual strand are identical
    const cidxA = Math.floor(Math.random() * PALETTE.length);
    let cidxB; do { cidxB = Math.floor(Math.random() * PALETTE.length); } while (cidxB === cidxA);
    const colorA = PALETTE[cidxA], colorB = PALETTE[cidxB];
    const sidxA = Math.floor(Math.random() * SHAPES.length);
    let sidxB; do { sidxB = Math.floor(Math.random() * SHAPES.length); } while (sidxB === sidxA);
    const shapeA = SHAPES[sidxA], shapeB = SHAPES[sidxB];
    const strandFont = randomFont(data.text);
    // Log the new audience message
    const _animal = POKE_ANIMALS[Math.floor(Math.random() * POKE_ANIMALS.length)];
    const _anonID = `@anonymous_${_animal.toLowerCase().replace(/[\s-]+/g, '_')}`;
    addConsoleLog(`${_anonID} commented "${data.text.slice(0, 28)}"!`, 'poke', 8000);
    strandColorStore.set(noteKey, {colorA, colorB, shapeA, shapeB, font: strandFont});
    _saveColorStore();
    // Write to Firebase so every other device uses the same visual assignment
    set(ref(db, `strandData/${noteKey}`), {colorA, colorB, shapeA, shapeB, font: strandFont}).catch(()=>{});
    showSpotlight(data.text, colorA, colorB, shapeA, shapeB, strandFont);
    await rebuildCurtain();
    // After rebuild the new strand is last in the array — highlight it
    if (strands.length > 0) {
      highlightStrand = strands[strands.length - 1];
      highlightUntil  = Date.now() + HIGHLIGHT_MS;
    }
    // Play magical chime as the spotlight fades and the strand reveals (~2.5s in)
    setTimeout(playNewStrandSound, 2400);
  });

  // ─── Listen to panel settings ───────────────────────────────────────────
  const PALETTES_MAP = {
    candy:  ['#5252CC','#E882C6','#F4E634','#F0A818','#30A040','#5CCCE8','#E83A90','#EEA0C0','#A0C4EC','#C0A8E8','#C8ECA0','#E07868'],
    neon:   ['#5252CC','#E83A90','#F4E634','#E07868','#30A040','#5C28A8','#5CCCE8','#4480C0','#E882C6','#3060CC','#F0A818','#2E7040'],
    pastel: ['#EEA0C0','#C8A8E8','#A8D4EC','#C0ECC0','#E07868','#A0C4EC','#F0C0D8','#E8EC9E','#A8B0E8','#D8ECA8','#C898D0','#CCA8DC'],
    fire:   ['#E83A90','#E882C6','#EEA0C0','#F0C0D8','#CCA8DC','#C8A8E8','#B8B0E0','#C898D0','#5C28A8','#9898DC','#E8A0C0','#A8B0E8'],
    ocean:  ['#5252CC','#3060CC','#4480C0','#5CCCE8','#A0C4EC','#A8D4EC','#C8E8F8','#A8B0E8','#9898DC','#C0A8E8','#B8B0E0','#C898D0'],
    mono:   ['#F4E634','#F0A818','#E86830','#E83A90','#E882C6','#EEA0C0','#F0C0D8','#C8ECA0','#D8ECA8','#E8EC9E','#CCA8DC','#C898D0'],
    gray:   ['#EEEEEE','#D4D4D4','#BABABA','#A0A0A0','#868686','#6C6C6C','#E8E8E8','#CECECE','#B4B4B4','#9A9A9A','#808080','#666666'],
    green:  ['#C8ECA0','#A8DC78','#80C850','#58B040','#30A040','#2E7040','#D8ECA8','#B0DC88','#88CC60','#50A838','#286830','#C0ECC0'],
    yellow: ['#F8F088','#F4E634','#ECCA10','#E8AE08','#E09800','#D88000','#FFFFE8','#F8F080','#EEE030','#E4C808','#DC9800','#F0ECA0'],
    pink:   ['#FFE0F0','#FFBEE0','#FF90CA','#FF60B0','#E83A90','#CC1870','#F0C8E0','#FFAAD0','#FF80BC','#F050A0','#D82080','#E882C6'],
  };
  let prevSettings = {};
  const _logTimers = {}; // debounce timers per setting key
  onValue(ref(db, 'settings'), snap => {
    const s = snap.val();
    if (!s) return;
    if (s.beadRadius !== undefined) {
      const oldSpacing = beadSpacing();
      CONFIG.BEAD_RADIUS = s.beadRadius;
      const newSpacing = beadSpacing();
      if (newSpacing !== oldSpacing && allConstraints.length > 0) {
        const ratio = newSpacing / oldSpacing;
        allConstraints.forEach(c => { c.len = c.len * ratio; });
      }
    }
    if (s.driftSpeed    !== undefined) CONFIG.DRIFT_SPEED    = s.driftSpeed;
    if (s.glowRadius    !== undefined) CONFIG.GLOW_RADIUS    = s.glowRadius;
    if (s.hoverVol      !== undefined) CONFIG.HOVER_VOL      = s.hoverVol;
    if (s.pokeVol       !== undefined) CONFIG.POKE_VOL       = s.pokeVol;
    if (s.palette && PALETTES_MAP[s.palette]) PALETTE = PALETTES_MAP[s.palette];

    // Log any changed values — debounced so rapid slider movement
    // only fires one message when the slider settles, not one per step.
    if (Object.keys(prevSettings).length > 0) {
      const labels = {
        beadRadius:    (v, p) => `@whnvr just made the beads ${v > p ? 'bigger' : 'smaller'}!`,
        driftSpeed:    (v, p) => v === 0
                                   ? '@whnvr just paused the drift!'
                                   : `@whnvr just made the drift ${v > p ? 'faster' : 'slower'}!`,
        glowRadius:    (v, p) => v === 0
                                   ? '@whnvr just turned off the glow!'
                                   : `@whnvr just made the glow ${v > p ? 'brighter' : 'dimmer'}!`,
        palette:       (v)    => {
          const names = { candy:'mixed', neon:'vivid', pastel:'soft', fire:'bloom',
                          ocean:'sky blue', mono:'warm', gray:'monochrome',
                          green:'grass field', yellow:'golden yellow', pink:'all pink' };
          return `@whnvr just switched to the ${names[v] || v} palette!`;
        },
        activeVisual:  (v)    => `@whnvr just switched to ${v}!`,
      };
      Object.entries(labels).forEach(([key, fmt]) => {
        if (s[key] !== undefined && s[key] !== prevSettings[key]) {
          // Capture values at this moment before prevSettings is updated
          const newVal = s[key], oldVal = prevSettings[key];
          clearTimeout(_logTimers[key]);
          _logTimers[key] = setTimeout(() => {
            addConsoleLog(fmt(newVal, oldVal), 'panel');
          }, 700);
        }
      });
    }
    prevSettings = { ...s };
  });

  // ─── Audience interference from submit.html ─────────────────────────────
  const POKE_ANIMALS = [
    'Quokka','Axolotl','Capybara','Pangolin','Narwhal','Blobfish',
    'Tardigrade','Platypus','Fossa','Okapi','Aye-aye','Mantis Shrimp',
    'Dumbo Octopus','Kakapo','Patagonian Mara','Saiga Antelope',
    'Star-nosed Mole','Shoebill','Babirusa','Tarsier','Naked Mole Rat',
    'Pygmy Seahorse','Mimic Octopus','Proboscis Monkey','Yeti Crab',
  ];

  // Remote mouse from panel.html touchpad
  onValue(ref(db, 'settings/curtainMouse'), snap => {
    const d = snap.val();
    if (d && typeof d.x === 'number') {
      const prevX = remoteMouse.x, prevY = remoteMouse.y;
      remoteMouse.x = d.x;
      remoteMouse.y = d.y;
      remoteMouse.active = d.active === true;
      // Play swish sound for remote movement, same logic as local mouse
      if (remoteMouse.active && prevX > -1) {
        const spd = Math.hypot((d.x - prevX) * W, (d.y - prevY) * H);
        if (spd > 4) {
          const now = Date.now();
          if (now - lastSwishMs > 140) {
            lastSwishMs = now;
            playSwish(Math.min(0.35, spd * 0.022));
          }
        }
      }
    } else {
      remoteMouse.active = false;
    }
  });

  let lastInterferenceT = 0;
  onValue(ref(db, 'interference'), snap => {
    const d = snap.val();
    if (!d || !d.t) return;
    if (d.t === lastInterferenceT) return;
    if (Date.now() - d.t > 4000) return;
    lastInterferenceT = d.t;
    applyInterferenceAt(d.x * W, d.y * H);
    playPokeSound();
    const animal  = POKE_ANIMALS[Math.floor(Math.random() * POKE_ANIMALS.length)];
    const pokeID  = `@anonymous_${animal.toLowerCase().replace(/[\s-]+/g, '_')}`;
    addConsoleLog(`${pokeID} poked the curtain!`, 'poke');
  });
}

// ─── One-shot repulsion from a screen point (like mouse but stronger) ────────
function applyInterferenceAt(x, y) {
  const R2 = 280*280, STRENGTH = 20;
  allParticles.forEach(p => {
    if (p.pinned) return;
    const dx=p.pos.x-x, dy=p.pos.y-y;
    const d2=dx*dx+dy*dy;
    if(d2<R2&&d2>0){
      const d=Math.sqrt(d2);
      const str=(1-d2/R2)*STRENGTH;
      p.push((dx/d)*str,(dy/d)*str);
    }
  });
}

// ─── Sound effects ────────────────────────────────────────────────────────────
let audioCtx = null;
let lastSwishMs = 0;
let _pageMuted = false;

function ensureAudio() {
  if (_pageMuted) return null;
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

// Single digital tone for poke
function beadTone(freq, delayS = 0, vol = 0.10) {
  const ac = ensureAudio();
  if (!ac) return;
  const osc = ac.createOscillator(), gain = ac.createGain();
  osc.connect(gain); gain.connect(ac.destination);
  osc.type = 'sine'; osc.frequency.value = freq;
  const t = ac.currentTime + delayS;
  gain.gain.setValueAtTime(vol, t);
  gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.28);
  osc.start(t); osc.stop(t + 0.28);
}

// Magical arrival chime — rising arpeggio with shimmer, plays when new strand appears
function playNewStrandSound() {
  const ac = ensureAudio();
  if (!ac) return;
  const now = ac.currentTime;
  // Random root from a pleasant range so each arrival sounds slightly different
  const root = [523, 587, 659, 740, 784][Math.floor(Math.random() * 5)];
  // Major-chord arpeggio: do → mi → sol → do'
  [1, 1.25, 1.5, 2.0].forEach((ratio, i) => {
    const freq = root * ratio;
    const t    = now + i * 0.10; // 100 ms between each note
    // Two slightly detuned sines per note for a shimmery chorus effect
    [0, 0.006].forEach(dt => {
      const osc  = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain); gain.connect(ac.destination);
      osc.type = 'sine';
      osc.frequency.value = freq * (1 + dt);
      const vol = dt === 0 ? 0.13 : 0.06;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(vol, t + 0.025); // soft attack
      gain.gain.exponentialRampToValueAtTime(0.0001, t + 1.1); // long magical decay
      osc.start(t); osc.stop(t + 1.1);
    });
  });
}

// Poke burst — same digital style but randomised every time
function playPokeSound() {
  if (CONFIG.POKE_VOL === 0) return;
  const base = 350 + Math.random() * 750;
  const n    = 4 + Math.floor(Math.random() * 5);
  const step = 0.025 + Math.random() * 0.045;
  for (let i = 0; i < n; i++) {
    const freq = base * (0.5 + Math.random() * 2.8);
    beadTone(freq, i * step, (0.07 + Math.random() * 0.07) * CONFIG.POKE_VOL);
  }
}

// Bead-curtain hover sound: crispy clicks + long resonant tail (nearby strands keep moving)
function playSwish(speedVol) {
  if (CONFIG.HOVER_VOL === 0) return;
  const ac  = ensureAudio();
  if (!ac) return;
  const now = ac.currentTime;
  const vol = speedVol * CONFIG.HOVER_VOL;

  function beadClick(t, volMult) {
    // Crispy filtered-noise click
    const len = Math.round(ac.sampleRate * 0.038);
    const buf = ac.createBuffer(1, len, ac.sampleRate);
    const dat = buf.getChannelData(0);
    for (let j = 0; j < len; j++)
      dat[j] = (Math.random() * 2 - 1) * Math.exp(-j / (len * 0.16));
    const src = ac.createBufferSource(), filt = ac.createBiquadFilter(), cg = ac.createGain();
    src.buffer = buf;
    filt.type = 'bandpass';
    filt.frequency.value = 3500 + Math.random() * 3500;
    filt.Q.value = 3 + Math.random() * 4;
    cg.gain.value = vol * volMult * 1.6;
    src.connect(filt); filt.connect(cg); cg.connect(ac.destination);
    src.start(t);

    // Soft bead-body resonance with longer decay
    const osc = ac.createOscillator(), og = ac.createGain();
    osc.connect(og); og.connect(ac.destination);
    osc.type = 'sine';
    osc.frequency.value = 900 + Math.random() * 900;
    og.gain.setValueAtTime(vol * volMult * 0.7, t);
    og.gain.exponentialRampToValueAtTime(0.0001, t + 0.28); // longer decay
    osc.start(t); osc.stop(t + 0.28);
  }

  // Initial burst: 2–4 clicks close together
  const numInitial = 2 + Math.floor(Math.random() * 3);
  for (let i = 0; i < numInitial; i++)
    beadClick(now + i * (0.008 + Math.random() * 0.018), 1.0);

  // Lingering tail: 3–5 quieter clicks spread over ~0.6s simulating nearby strands
  const numTail = 3 + Math.floor(Math.random() * 3);
  for (let i = 0; i < numTail; i++) {
    const delay = 0.07 + i * (0.08 + Math.random() * 0.06);
    beadClick(now + delay, 0.35 - i * 0.06);
  }
}

// ─── Mouse repulsion ─────────────────────────────────────────────────────────
const mouse = { x: -9999, y: -9999 };
let prevMouseX = -9999, prevMouseY = -9999;
canvas.addEventListener('pointermove', e => {
  const r = canvas.getBoundingClientRect();
  const nx = e.clientX - r.left, ny = e.clientY - r.top;
  // Swish when moving fast enough over the curtain
  const spd = Math.hypot(nx - prevMouseX, ny - prevMouseY);
  if (spd > 4 && prevMouseX > -9000) {
    const now = Date.now();
    if (now - lastSwishMs > 140) {
      lastSwishMs = now;
      playSwish(Math.min(0.35, spd * 0.022));
    }
  }
  prevMouseX = mouse.x = nx;
  prevMouseY = mouse.y = ny;
});
canvas.addEventListener('pointerdown', ensureAudio); // unlock audio on any tap
canvas.addEventListener('pointerleave', () => { mouse.x=-9999; mouse.y=-9999; });

// Remote mouse position sent from panel.html touchpad (normalised 0–1)
let remoteMouse = { x: -9999, y: -9999, active: false };

function applyMouse() {
  const MOUSE_RADIUS2 = 90*90, MOUSE_STRENGTH = 2.5; // subtler than before
  // Apply both local cursor and panel touchpad
  const sources = [mouse];
  if (remoteMouse.active) sources.push({ x: remoteMouse.x * W, y: remoteMouse.y * H });
  sources.forEach(src => {
    allParticles.forEach(p => {
      if (p.pinned) return;
      const dx=p.pos.x-src.x, dy=p.pos.y-src.y;
      const d2=dx*dx+dy*dy;
      if(d2<MOUSE_RADIUS2&&d2>0){
        const d=Math.sqrt(d2);
        const str=(1-d2/MOUSE_RADIUS2)*MOUSE_STRENGTH;
        p.push((dx/d)*str,(dy/d)*str);
      }
    });
  });
}

// ─── Draw ────────────────────────────────────────────────────────────────────
function draw() {
  const dpr = window.devicePixelRatio || 1;
  // Scale all drawing to physical pixels so the canvas is crisp on Retina screens.
  // Every absolute ctx.setTransform call below must embed this dpr factor.
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,W,H);
  strands.forEach(strand => {
    const pts = strand.particles;

    // Reset transform before each strand — keep dpr scale, no rotation/translation
    ctx.setTransform(dpr,0,0,dpr,0,0);

    // Draw thread through all beads including tail (skip invisible pin at index 0)
    ctx.beginPath();
    ctx.strokeStyle = strand.color+'44';
    ctx.lineWidth   = 1.5;
    let started = false;
    for (let i=1; i<pts.length; i++) {
      if (!started) { ctx.moveTo(pts[i].pos.x, pts[i].pos.y); started=true; }
      else            ctx.lineTo(pts[i].pos.x, pts[i].pos.y);
    }
    ctx.stroke();

    pts.forEach(p => {
      if (!p.char) return;
      const con = p.downConstraint;
      let angle = 0;
      if (con) {
        const dx=con.p2.pos.x-con.p1.pos.x;
        const dy=con.p2.pos.y-con.p1.pos.y;
        angle=Math.atan2(dy,dx)-Math.PI/2;
      }
      const img=getCharCanvas(p.char,p.color,p.shape,p.radius,p.font);
      const half=img.width/2;
      const cos=Math.cos(angle),sin=Math.sin(angle);
      // Motion blur: draw fading trail copies along the velocity vector
      const vx=p.pos.x-p.old.x, vy=p.pos.y-p.old.y;
      const spd=Math.hypot(vx,vy);
      if(spd>1){
        const steps=Math.min(4,Math.ceil(spd*0.8));
        for(let t=steps;t>=1;t--){
          ctx.globalAlpha=0.18*(1-t/(steps+1));
          ctx.setTransform(cos*dpr,sin*dpr,-sin*dpr,cos*dpr,
            (p.pos.x-vx*t*0.45)*dpr, (p.pos.y-vy*t*0.45)*dpr);
          ctx.drawImage(img,-half,-half);
        }
        ctx.globalAlpha=1;
      }
      ctx.setTransform(cos*dpr,sin*dpr,-sin*dpr,cos*dpr,p.pos.x*dpr,p.pos.y*dpr);
      ctx.drawImage(img,-half,-half);
    });

  });

  // ── Glow ring on newly-added strand so audience can spot their text ──────
  if (highlightStrand && Date.now() < highlightUntil) {
    const t = (highlightUntil - Date.now()) / HIGHLIGHT_MS; // 1→0 linear
    ctx.setTransform(dpr,0,0,dpr,0,0);
    highlightStrand.particles.forEach(p => {
      if (!p.char) return;
      const br = (p.radius !== null ? p.radius : CONFIG.BEAD_RADIUS);
      // Soft outer halo
      ctx.beginPath();
      ctx.arc(p.pos.x, p.pos.y, br * 2.8, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${(t * 0.18).toFixed(3)})`;
      ctx.fill();
      // Bright white ring with glow
      ctx.beginPath();
      ctx.arc(p.pos.x, p.pos.y, br * 1.9, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(255,255,255,${(t * 0.85).toFixed(3)})`;
      ctx.lineWidth    = 2.5;
      ctx.shadowColor  = '#ffffff';
      ctx.shadowBlur   = 20;
      ctx.stroke();
      ctx.shadowBlur   = 0;
    });
  } else {
    highlightStrand = null;
  }

  // Posters drawn last so they sit in front of the curtain
  drawPostersRow();

  ctx.setTransform(dpr,0,0,dpr,0,0);
}

// ─── Console log overlay ─────────────────────────────────────────────────────
function addConsoleLog(msg, type = 'panel', duration = 2800) {
  const wrap = document.getElementById('console-log');
  const t    = new Date().toTimeString().slice(0, 8);
  const el   = document.createElement('div');
  el.className   = `clog clog-${type}`;
  el.textContent = `${t}  ${msg}`;
  wrap.insertBefore(el, wrap.firstChild); // newest entry on top
  while (wrap.children.length > 6) wrap.removeChild(wrap.lastChild);
  setTimeout(() => el.classList.add('fading'), duration);
  setTimeout(() => el.remove(), duration + 1400);
}

// ─── Loop ────────────────────────────────────────────────────────────────────
function loop() {
  requestAnimationFrame(loop);
  driftAndLoop();
  applyMouse();
  allParticles.forEach(p => p.update());
  for(let i=0;i<6;i++) allConstraints.forEach(c=>c.solve());
  draw();
}
requestAnimationFrame(loop);

// ─── Mute control from display.html ──────────────────────────────────────────
window.addEventListener('message', e => {
  if (!e.data || typeof e.data.type !== 'string') return;
  if (e.data.type === 'mute') {
    _pageMuted = true;
    if (audioCtx) audioCtx.suspend().catch(()=>{});
  }
  if (e.data.type === 'unmute') {
    _pageMuted = false;
    if (audioCtx) audioCtx.resume().catch(()=>{});
  }
});

// ─── Init ────────────────────────────────────────────────────────────────────
initStrands();

</script>
